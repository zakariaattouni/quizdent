<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب التشخيص السني</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tajawal,sans-serif;
}

body{
background:#eef6fb;
padding:20px;
}

.app{
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:15px;
}

h1,h2{
margin-bottom:15px;
color:#1e4a6e;
text-align:center;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:14px;
border:1px solid #d8e4ec;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:#1f7b6e;
color:white;
font-weight:bold;
cursor:pointer;
margin-top:8px;
}

button:hover{
opacity:.9;
}

.screen{
display:none;
}

.screen.active{
display:block;
}

.q-item{
background:#f8fafc;
padding:12px;
border-radius:14px;
margin-top:10px;
}

.small{
font-size:.9rem;
text-align:center;
margin-top:10px;
}

a{
color:#1f7b6e;
text-decoration:none;
}

.option{
background:#f5f8fb;
padding:12px;
border-radius:14px;
margin:8px 0;
cursor:pointer;
}

.option.correct{
background:#00b894;
color:white;
}

.option.wrong{
background:#d63031;
color:white;
}
</style>
</head>
<body>

<div class="app">

<div class="card">
<h1>🦷 مدرب التشخيص السني</h1>
</div>

<!-- LOGIN -->
<div id="login" class="screen active">
<div class="card">
<h2>تسجيل الدخول</h2>

<input id="user" placeholder="اسم المستخدم">
<input id="pass" type="password" placeholder="كلمة السر">

<button onclick="login()">دخول</button>

<div class="small">
<a href="#" onclick="show('register')">إنشاء حساب جديد</a>
</div>
</div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
<div class="card">
<h2>تسجيل جديد</h2>

<input id="regUser" placeholder="اسم المستخدم">
<input id="regPass" type="password" placeholder="كلمة السر">

<button onclick="register()">تسجيل</button>
<button onclick="show('login')">رجوع</button>
</div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
<div class="card">
<h2>لوحة الإدارة</h2>

<textarea id="qText" placeholder="السؤال"></textarea>
<input id="o1" placeholder="الخيار الأول">
<input id="o2" placeholder="الخيار الثاني">
<input id="o3" placeholder="الخيار الثالث">
<input id="o4" placeholder="الخيار الرابع">
<input id="correct" placeholder="الإجابة الصحيحة حرفياً">
<textarea id="exp" placeholder="التفسير"></textarea>

<button onclick="saveQuestion()">حفظ السؤال</button>
<button onclick="logout()">خروج</button>

<div id="questionsList"></div>
</div>
</div>

<!-- STUDENT -->
<div id="student" class="screen">
<div class="card">
<h2>الاختبار</h2>

<div id="questionArea"></div>

<button onclick="logout()">خروج</button>
</div>
</div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
authDomain: "quizdental-c4d5a.firebaseapp.com",
databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com",
projectId: "quizdental-c4d5a",
storageBucket: "quizdental-c4d5a.appspot.com",
messagingSenderId: "750036143183",
appId: "1:750036143183:web:721a31ef795f973887ee3a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questions = [];
let current = 0;

function show(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function key(s){
return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,'');
}

async function ensureAdmin(){
const snap = await db.ref('users/admin').once('value');

if(!snap.val()){
await db.ref('users/admin').set({
name:'admin',
password:'admin123',
role:'admin'
});
}
}

async function register(){
const u = document.getElementById('regUser').value.trim();
const p = document.getElementById('regPass').value.trim();

if(!u || !p){
alert('املأ الحقول');
return;
}

await db.ref('users/' + key(u)).set({
name:u,
password:p,
role:'user'
});

alert('تم التسجيل');
show('login');
}

async function login(){
const u = document.getElementById('user').value.trim();
const p = document.getElementById('pass').value.trim();

if(!u || !p){
alert('أدخل البيانات');
return;
}

// admin
if(u === 'admin' && p === 'admin123'){
show('admin');
loadQuestionsAdmin();
return;
}

// user
const snap = await db.ref('users/' + key(u)).once('value');
const data = snap.val();

if(!data){
alert('المستخدم غير موجود');
return;
}

if(data.password !== p){
alert('كلمة السر غير صحيحة');
return;
}

show('student');
startQuiz();
}

async function saveQuestion(){
const q = document.getElementById('qText').value.trim();
const o1 = document.getElementById('o1').value.trim();
const o2 = document.getElementById('o2').value.trim();
const o3 = document.getElementById('o3').value.trim();
const o4 = document.getElementById('o4').value.trim();
const c = document.getElementById('correct').value.trim();
const e = document.getElementById('exp').value.trim();

if(!q || !o1 || !o2 || !o3 || !o4 || !c){
alert('بيانات ناقصة');
return;
}

await db.ref('questions').push({
q:q,
o:[o1,o2,o3,o4],
c:c,
e:e
});

alert('تم الحفظ');

loadQuestionsAdmin();
}

async function loadQuestionsAdmin(){
const snap = await db.ref('questions').once('value');
const data = snap.val();

const box = document.getElementById('questionsList');
box.innerHTML = '';

if(!data){
box.innerHTML = '<div class="q-item">لا توجد أسئلة</div>';
return;
}

Object.entries(data).forEach(([id,q],i)=>{
const div = document.createElement('div');
div.className = 'q-item';
div.innerHTML = '<b>'+(i+1)+'.</b> '+q.q;
box.appendChild(div);
});
}

async function startQuiz(){
const snap = await db.ref('questions').once('value');
const data = snap.val();

if(!data){
document.getElementById('questionArea').innerHTML = 'لا توجد أسئلة';
return;
}

questions = Object.values(data);
current = 0;
renderQuestion();
}

function renderQuestion(){
if(current >= questions.length){
document.getElementById('questionArea').innerHTML = '<h3>انتهى الاختبار</h3>';
return;
}

const q = questions[current];

let html = '<h3>'+q.q+'</h3>';

const shuffled = [...q.o].sort(()=>Math.random()-0.5);

shuffled.forEach(opt=>{
html += `<div class="option" onclick="checkAnswer(this, '${opt.replace(/'/g,"\\'")}', '${q.c.replace(/'/g,"\\'")}')">${opt}</div>`;
});

html += `<div style="margin-top:10px;color:#555;">${q.e || ''}</div>`;

document.getElementById('questionArea').innerHTML = html;
}

function checkAnswer(el,opt,correct){
const options = document.querySelectorAll('.option');

options.forEach(o=>o.style.pointerEvents='none');

if(opt === correct){
el.classList.add('correct');
}else{
el.classList.add('wrong');

options.forEach(o=>{
if(o.innerText === correct){
o.classList.add('correct');
}
});
}

setTimeout(()=>{
current++;
renderQuestion();
},1500);
}

function logout(){
show('login');
}

window.onload = async ()=>{
await ensureAdmin();
};

</script>

</body>
</html>
