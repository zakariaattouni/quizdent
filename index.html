<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدرب التشخيص السني | د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; padding: 15px; }
        .app-container { max-width: 600px; width: 100%; }
        .screen { display: none; }
        .active { display: block; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .question-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-align: right; }
        .option-card { background: #f8f9fa; border: 2px solid #edf2f7; padding: 15px; border-radius: 18px; cursor: pointer; margin-bottom: 10px; text-align: right; font-weight: bold; }
        .correct-card { background: #06d6a0; color: white; }
        .wrong-card { background: #ef476f; color: white; }
        .btn { background: #3a86ff; color: white; border: none; padding: 12px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-admin { background: #8b5cf6; }
        .btn-danger { background: #ef476f; }
        .btn-warning { background: #ffb703; color: #000; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 15px; border: 2px solid #e2e8f0; font-size: 1rem; }
        textarea { font-family: monospace; direction: ltr; text-align: left; }
        .question-item { background: #f1f5f9; padding: 10px; border-radius: 15px; margin-bottom: 10px; }
        .flex { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .status-pill { background: #e2e8f0; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; }
        .exp-box { background: #fffbeb; border-right: 4px solid #ffd166; padding: 12px; margin-top: 15px; border-radius: 12px; display: none; }
        hr { margin: 15px 0; }
        .batch-area { background: #f8fafc; border: 2px dashed #8b5cf6; border-radius: 15px; padding: 12px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- ================= شاشة الدخول الموحدة ================= -->
    <div id="loginScreen" class="screen active card">
        <h2 style="color:#3a86ff;">مدرب التشخيص السني</h2>
        <p>بإشراف د. زكريا محمد عطوني</p>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة السر">
        <button class="btn" onclick="doLogin()">دخول</button>
        <p style="margin-top:15px; text-align:center;"><a href="#" onclick="showScreen('registerScreen')">تسجيل جديد (للطلاب)</a></p>
    </div>

    <!-- ================= شاشة التسجيل ================= -->
    <div id="registerScreen" class="screen card">
        <h3>تسجيل جديد (للطلاب)</h3>
        <input type="text" id="regUser" placeholder="الاسم الكامل">
        <input type="password" id="regPass" placeholder="كلمة السر">
        <button class="btn" onclick="doRegister()">إرسال الطلب</button>
        <button class="btn" style="background:#aaa;" onclick="showScreen('loginScreen')">رجوع</button>
    </div>

    <!-- ================= واجهة الطالب ================= -->
    <div id="studentScreen" class="screen card">
        <div class="flex" style="justify-content: space-between;">
            <span class="status-pill" id="qCounter">--</span>
            <span class="status-pill" id="scoreValue">النقاط: 0</span>
        </div>
        <div id="qText" class="question-text"></div>
        <div id="optionsGrid"></div>
        <div id="expBox" class="exp-box"></div>
        <button class="btn" onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- ================= واجهة المدير ================= -->
    <div id="adminScreen" class="screen card">
        <h3>🔧 لوحة الإدارة (المدير)</h3>
        
        <div class="batch-area">
            <button class="btn btn-admin" onclick="toggleBatchJson()">📦 إضافة دفعة JSON (50 سؤال فأكثر)</button>
            <div id="batchJsonPanel" style="display:none; margin-top:10px;">
                <textarea id="batchJsonInput" rows="12" placeholder='[{"q": "نص السؤال", "o": ["1","2","3","4"], "c": "1", "e": "شرح"}]' style="direction:ltr; text-align:left;"></textarea>
                <button class="btn btn-admin" onclick="addBatchQuestions()">➕ إضافة الدفعة إلى قاعدة البيانات</button>
                <button class="btn" style="background:#aaa;" onclick="toggleBatchJson()">إلغاء</button>
            </div>
        </div>

        <button class="btn btn-admin" onclick="showAddSingleForm()">➕ إضافة سؤال واحد</button>
        <div id="adminQuestionsList" style="max-height: 400px; overflow-y: auto; margin-top: 15px;"></div>
        <button class="btn" onclick="logout()">تسجيل خروج</button>
    </div>

    <!-- نموذج إضافة/تعديل سؤال واحد -->
    <div id="singleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius:25px; padding:20px; width:90%; max-width:500px; margin:auto;">
            <h3 id="modalTitle">إضافة سؤال</h3>
            <input type="text" id="newQ" placeholder="نص السؤال">
            <input type="text" id="newOpt1" placeholder="الخيار 1">
            <input type="text" id="newOpt2" placeholder="الخيار 2">
            <input type="text" id="newOpt3" placeholder="الخيار 3">
            <input type="text" id="newOpt4" placeholder="الخيار 4">
            <input type="text" id="newCorrect" placeholder="الإجابة الصحيحة (نص مطابق)">
            <textarea id="newExp" rows="2" placeholder="التفسير"></textarea>
            <div class="flex">
                <button class="btn" id="saveQuestionBtn">حفظ</button>
                <button class="btn" style="background:#aaa;" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
    authDomain: "quizdental-c4d5a.firebaseapp.com",
    projectId: "quizdental-c4d5a",
    databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com/",
    storageBucket: "quizdental-c4d5a.appspot.com",
    messagingSenderId: "750036143183",
    appId: "1:750036143183:web:721a31ef795f973887ee3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUserType = null;
let questionsList = [];
let quizQuestions = [], quizScore = 0, quizIndex = 0;

// تشغيل عند تحميل الصفحة للتحقق من الجلسة السابقة
window.onload = function() {
    checkPersistentLogin();
};

async function checkPersistentLogin() {
    const savedUser = localStorage.getItem('dentalQuizUser');
    const savedPass = localStorage.getItem('dentalQuizPass');
    if (savedUser && savedPass) {
        // محاولة تسجيل الدخول تلقائياً بالبيانات المحفوظة
        await handleLoginLogic(savedUser, savedPass, true);
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
function makeKey(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,""); }

async function doRegister() {
    let u = document.getElementById('regUser').value.trim();
    let p = document.getElementById('regPass').value.trim();
    if(!u || !p) return alert("املأ الحقول");
    await db.ref('users/'+makeKey(u)).set({ name: u, password: p, status: 'pending' });
    alert("تم إرسال الطلب. المدير سيفعّل الحساب.");
    showScreen('loginScreen');
}

async function doLogin() {
    let u = document.getElementById('username').value.trim();
    let p = document.getElementById('password').value.trim();
    await handleLoginLogic(u, p, false);
}

// دالة منطق تسجيل الدخول الموحدة
async function handleLoginLogic(u, p, isAuto) {
    if(!u || !p) return;

    // حالة المدير
    if(u === "admin" && p === "salem1959") {
        currentUserType = 'admin';
        localStorage.setItem('dentalQuizUser', u);
        localStorage.setItem('dentalQuizPass', p);
        await loadQuestions();
        showAdminPanel();
        return;
    }
    
    // حالة الطالب
    try {
        let snap = await db.ref('users/'+makeKey(u)).once('value');
        let data = snap.val();
        if(data && data.password === p && data.status === 'active') {
            currentUserType = 'student';
            localStorage.setItem('dentalQuizUser', u);
            localStorage.setItem('dentalQuizPass', p);
            await loadQuestions();
            startStudentQuiz();
        } else {
            if(!isAuto) alert("بيانات خاطئة أو الحساب غير مفعل");
            if(isAuto) logout(); 
        }
    } catch(e) {
        console.error("Login Error", e);
    }
}

async function loadQuestions() {
    let snap = await db.ref('questions').once('value');
    let data = snap.val();
    questionsList = data ? Object.entries(data).map(([id,q])=>({...q, firebaseId:id})) : [];
}

function showAdminPanel() {
    showScreen('adminScreen');
    renderAdminList();
}

function renderAdminList() {
    let container = document.getElementById('adminQuestionsList');
    if(!container) return;
    if(questionsList.length===0) {
        container.innerHTML = "<p>⚠️ لا توجد أسئلة.</p>";
        return;
    }
    container.innerHTML = "";
    questionsList.forEach((q,i)=>{
        let div = document.createElement('div');
        div.className = "question-item";
        div.innerHTML = `<div><strong>${i+1}. ${q.q}</strong><br>✓ الإجابة: ${q.c}</div>
                         <div class="flex">
                             <button class="btn" style="background:#ffb703; color:#000;" onclick="editQuestion('${q.firebaseId}')">✏️ تعديل</button>
                             <button class="btn btn-danger" onclick="deleteQuestion('${q.firebaseId}')">🗑️ حذف</button>
                         </div>`;
        container.appendChild(div);
    });
}

function toggleBatchJson() {
    let panel = document.getElementById('batchJsonPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

async function addBatchQuestions() {
    let jsonText = document.getElementById('batchJsonInput').value.trim();
    if(!jsonText) return alert("الرجاء لصق مصفوفة JSON.");
    let batch;
    try { batch = JSON.parse(jsonText); } catch(e) { return alert("خطأ في JSON"); }
    
    let added = 0;
    for(let item of batch) {
        await db.ref('questions').push({ q: item.q, o: item.o, c: item.c, e: item.e });
        added++;
    }
    alert(`✅ تمت إضافة ${added} سؤال.`);
    toggleBatchJson();
    await loadQuestions();
    renderAdminList();
}

function showAddSingleForm() {
    document.getElementById('modalTitle').innerText = "إضافة سؤال";
    document.querySelectorAll('#singleModal input, #singleModal textarea').forEach(el=>el.value='');
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('saveQuestionBtn').onclick = () => addSingleQuestion();
}

async function addSingleQuestion() {
    let q = document.getElementById('newQ').value.trim();
    let o = [document.getElementById('newOpt1').value, document.getElementById('newOpt2').value, document.getElementById('newOpt3').value, document.getElementById('newOpt4').value];
    let c = document.getElementById('newCorrect').value.trim();
    let e = document.getElementById('newExp').value.trim();
    await db.ref('questions').push({q,o,c,e});
    closeModal();
    await loadQuestions();
    renderAdminList();
}

function editQuestion(id) {
    let qq = questionsList.find(x=>x.firebaseId===id);
    document.getElementById('newQ').value = qq.q;
    document.getElementById('newOpt1').value = qq.o[0];
    document.getElementById('newOpt2').value = qq.o[1];
    document.getElementById('newOpt3').value = qq.o[2];
    document.getElementById('newOpt4').value = qq.o[3];
    document.getElementById('newCorrect').value = qq.c;
    document.getElementById('newExp').value = qq.e;
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('saveQuestionBtn').onclick = () => updateQuestion(id);
}

async function updateQuestion(id) {
    let q = document.getElementById('newQ').value;
    let o = [document.getElementById('newOpt1').value, document.getElementById('newOpt2').value, document.getElementById('newOpt3').value, document.getElementById('newOpt4').value];
    let c = document.getElementById('newCorrect').value;
    let e = document.getElementById('newExp').value;
    await db.ref('questions/'+id).set({q,o,c,e});
    closeModal();
    await loadQuestions();
    renderAdminList();
}

async function deleteQuestion(id) {
    if(confirm("حذف؟")) {
        await db.ref('questions/'+id).remove();
        await loadQuestions();
        renderAdminList();
    }
}

function closeModal() { document.getElementById('singleModal').style.display = 'none'; }

function startStudentQuiz() {
    if(questionsList.length === 0) return (alert("لا توجد أسئلة"), logout());
    quizQuestions = [...questionsList].sort(()=>Math.random()-0.5);
    quizScore = 0; quizIndex = 0;
    showScreen('studentScreen');
    renderQuiz();
}

function renderQuiz() {
    if(quizIndex >= quizQuestions.length) {
        alert("انتهت الأسئلة!");
        return startStudentQuiz(); // إعادة تشغيل أو تخصيص نهاية
    }
    let q = quizQuestions[quizIndex];
    document.getElementById('qCounter').innerText = `السؤال: ${quizIndex+1} / ${quizQuestions.length}`;
    document.getElementById('scoreValue').innerText = `النقاط: ${quizScore}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('expBox').style.display = 'none';
    let grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";
    q.o.forEach(opt=>{
        let btn = document.createElement('div');
        btn.className = 'option-card';
        btn.innerText = opt;
        btn.onclick = ()=>{
            if(document.querySelector('.correct-card')) return;
            if(opt === q.c) {
                btn.classList.add('correct-card');
                quizScore += 10;
            } else {
                btn.classList.add('wrong-card');
                Array.from(grid.children).forEach(ch=>{ if(ch.innerText===q.c) ch.classList.add('correct-card'); });
            }
            document.getElementById('expBox').innerHTML = `<b>📘 التفسير:</b> ${q.e}`;
            document.getElementById('expBox').style.display = 'block';
            setTimeout(()=>{ quizIndex++; renderQuiz(); }, 2500);
        };
        grid.appendChild(btn);
    });
}

function logout() {
    // مسح البيانات المحفوظة عند الخروج الصريح فقط
    localStorage.removeItem('dentalQuizUser');
    localStorage.removeItem('dentalQuizPass');
    currentUserType = null;
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showScreen('loginScreen');
}
</script>
</body>
</html>
