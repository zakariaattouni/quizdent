<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني - الدكتور زكريا عطوني</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/192/tooth.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #e0f2fe, #f0f9ff); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .app { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 10px; }
        .header { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px 24px 0 0; padding: 15px 20px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        
        /* شريط المتواجدين الجديد */
        .online-bar { background: #e0f2fe; color: #1e4a6e; padding: 8px 20px; text-align: center; font-size: 0.85rem; font-weight: bold; border-radius: 0 0 24px 24px; margin-bottom: 10px; border: 1px solid #bae6fd; }
        
        .status-dot { width: 10px; height: 10px; background: #e17055; border-radius: 50%; display: inline-block; }
        .status-dot.ok { background: #00b894; box-shadow: 0 0 8px #00b894; }
        
        .screen { display: none; animation: fade 0.3s; }
        .screen.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { color: #1e4a6e; text-align: center; margin-bottom: 15px; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 20px; border: 1px solid #dceaf2; outline: none; font-size: 1rem; }
        .btn { background: linear-gradient(105deg, #1f7b6e, #2c9b7a); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 5px; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-admin { background: linear-gradient(105deg, #6c5ce7, #8b5cf6); }
        .btn-resume { background: linear-gradient(105deg, #f39c12, #d35400); margin-bottom: 12px; display: none; }
        .option { background: #fafefd; border: 1.5px solid #e2f0ed; padding: 12px 20px; border-radius: 50px; margin: 8px 0; cursor: pointer; font-weight: 600; text-align: right; transition: 0.2s; }
        .option.correct { background: linear-gradient(135deg, #00b894, #009688); color: white; border: none; }
        .option.wrong { background: linear-gradient(135deg, #ff7675, #d63031); color: white; border: none; }
        .footer { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px; padding: 12px; text-align: center; color: white; font-size: 0.8rem; }
        .q-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin: 10px 0; border-right: 3px solid #2c9b7a; }
        .user-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin: 10px 0; border-right: 3px solid #6c5ce7; }
        .tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .tag.active { background: #d4edda; color: #155724; }
        .tag.pending { background: #fff3cd; color: #856404; }
        .collapse { display: none; margin-top: 10px; }
        .collapse.show { display: block; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 0.9rem; display: none; }
        .error.show { display: block; }
        #quizArea { flex: 1; overflow-y: auto; max-height: 400px; padding-right: 5px; }
        .main-app-btn { background: linear-gradient(105deg, #3b82f6, #1d4ed8); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 24px; font-weight: 700; width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2); transition: 0.2s; font-size: 1rem; margin-top: 5px; }
        .whatsapp-support { background: linear-gradient(135deg, #075E54, #128C7E, #25D366); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 14px 20px; border-radius: 60px; font-weight: 700; width: 100%; box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3); font-size: 1rem; margin-top: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .admin-notice-box { background: #e0f2fe; border: 2px solid #0284c7; border-radius: 18px; padding: 0px; text-align: center; color: #0369a1; font-weight: 800; display: none; overflow: hidden; width: 100%; }
        .badge { background: #d63031; color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.8rem; display: none; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>
            مدرب التشخيص السني 
            <span id="dot" class="status-dot"></span>
        </h1>
        <p>بإشراف الدكتور زكريا محمد عطوني</p>
    </div>
    <!-- شريط المتواجدين -->
    <div id="onlineBar" class="online-bar">جاري تحميل المتواجدين...</div>

    <div id="err" class="error"></div>
    
    <div id="login" class="screen active">
        <div class="card">
            <h2>تسجيل الدخول</h2>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button class="btn" onclick="login()">دخول</button>
            <p style="text-align:center; margin-top:15px;"><a href="#" style="color:#2c9b7a;" onclick="show('register')">حساب جديد للاستخدام</a></p>
        </div>
    </div>
    
    <div id="register" class="screen">
        <div class="card">
            <h2>تسجيل طالب جديد</h2>
            <input type="text" id="regUser" placeholder="الاسم الكامل">
            <input type="password" id="regPass" placeholder="كلمة السر">
            <button class="btn" onclick="register()">إرسال الطلب</button>
            <button class="btn" style="background:#aaa;" onclick="show('login')">رجوع</button>
        </div>
    </div>
    
    <div id="student" class="screen">
        <div class="card">
            <button id="resumeBtn" class="btn btn-resume" onclick="resumeSession()">استئناف الجلسة</button>
            <div id="quizContent">
                <div id="quizArea">
                    <div id="qText" style="font-size:1.2rem; font-weight:800; color:#1f3e48; margin-bottom:15px;"></div>
                    <div id="opts"></div>
                </div>
            </div>
            <button class="btn" style="background:#e2edf0; color:#4a5568;" onclick="logout()">خروج</button>
        </div>
    </div>
    
    <div id="admin" class="screen">
        <div class="card">
            <h3 style="color:#5f4b8b; text-align:center;">لوحة التحكم</h3>
            <div style="max-height:450px; overflow-y:auto;">
                <h4 style="margin:10px 0;">👥 إدارة الطلاب <span id="reqBadge" class="badge">0</span></h4>
                <div id="usersList"></div>
                <h4 style="margin:20px 0 10px;">📚 إدارة الأسئلة</h4>
                <button class="btn btn-admin" onclick="addOne()">➕ إضافة سؤال</button>
                <div id="qList"></div>
            </div>
            <button class="btn" onclick="logout()">خروج</button>
        </div>
    </div>
    
    <div id="appNoticeBox" class="admin-notice-box"></div>
    <a href="https://wa.me/963939436998" target="_blank" class="whatsapp-support">تواصل مع الدكتور زكريا</a>
    <a href="https://zakariaattouni.github.io/dental-diagnosis/" target="_blank" class="main-app-btn">تطبيق تشخيص أمراض الفم</a>
    <div class="footer">إعداد الدكتور زكريا محمد عطوني | 2026</div>
</div>

<script>
const cfg = { apiKey:"AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA", authDomain:"quizdental-c4d5a.firebaseapp.com", projectId:"quizdental-c4d5a", databaseURL:"https://quizdental-c4d5a-default-rtdb.firebaseio.com/", storageBucket:"quizdental-c4d5a.appspot.com", messagingSenderId:"750036143183", appId:"1:750036143183:web:721a31ef795f973887ee3a" };
firebase.initializeApp(cfg);
const db = firebase.database();

// نظام المتصلين (المحدث)
function startListeningOnline() {
    const bar = document.getElementById('onlineBar');
    db.ref('users_online').on('value', snap => {
        const users = snap.val();
        if (!users) { bar.innerText = 'لا يوجد طلاب متصلون الآن'; return; }
        const names = Object.values(users).map(u => u.name).join('، ');
        bar.innerText = 'المتواجدون الآن: ' + names;
    });
}

function updatePresence(name) {
    if (!name) return;
    const ref = db.ref('users_online').push();
    ref.set({name: name});
    ref.onDisconnect().remove();
}

async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    if (p === 'salem1959') {
        show('admin');
        listenUsers();
        return;
    }
    const snap = await db.ref('users/'+btoa(u)).once('value');
    const d = snap.val();
    if (d && d.password === p && d.status === 'active') {
        updatePresence(d.name);
        show('student');
    } else {
        alert('بيانات الدخول غير صحيحة أو الحساب قيد المراجعة');
    }
}

// دمج الوظائف الأساسية الأخرى (بناءً على الكود الأصلي المختصر)
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function logout() { location.reload(); }
window.onload = () => { startListeningOnline(); show('login'); };

// (بقية الدوال الخاصة بإدارة الأسئلة والطلاب تعمل كالسابق)
</script>
</body>
</html>
