<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدرب التشخيص السني | د. زكريا عطوني | تمييز فائق للإجابات</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            max-width: 580px;
            width: 100%;
            margin: 0 auto;
            flex: 0 1 auto;
        }

        .screen {
            display: none;
            animation: fadeSlideUp 0.3s ease-out;
        }

        .active {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 28px 22px;
            margin-bottom: 20px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(66, 153, 225, 0.15);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        h2 {
            color: #1e4a6e;
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(120deg, #155e75, #1e6f5c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        input, textarea {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            border-radius: 28px;
            border: 1.5px solid #dceaf2;
            background-color: #ffffff;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            font-weight: 500;
        }

        input:focus, textarea:focus {
            border-color: #2c9b7a;
            box-shadow: 0 0 0 3px rgba(44, 155, 122, 0.2);
        }

        .btn {
            background: linear-gradient(105deg, #1f7b6e, #2c9b7a);
            color: white;
            border: none;
            padding: 14px 18px;
            width: 100%;
            border-radius: 44px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 12px;
            transition: all 0.25s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #186b5d, #248a6b);
        }

        .btn-admin {
            background: linear-gradient(105deg, #5f4b8b, #7c62b0);
        }

        .btn-danger {
            background: linear-gradient(105deg, #c44569, #e76f51);
        }

        /* ----------------- تحسين تمييز الإجابة الصحيحة (أشباع لوني عالٍ) ----------------- */
        .option-card {
            background: #fafefd;
            border: 2px solid #e2f0ed;
            padding: 14px 20px;
            border-radius: 60px;
            cursor: pointer;
            margin-bottom: 12px;
            text-align: right;
            font-weight: 600;
            transition: all 0.2s ease;
            color: #1e4a6e;
            position: relative;
        }

        .option-card:hover {
            background: #eef9f5;
            border-color: #8fc9bc;
            transform: scale(0.99);
        }

        /* الإجابة الصحيحة بشكل قوي ومشبع */
        .correct-card {
            background: linear-gradient(135deg, #00b894, #009688) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 8px 20px rgba(0, 184, 148, 0.5) !important;
            font-weight: 800;
            position: relative;
            padding-right: 45px;
            animation: pulse-correct 0.4s ease-out;
        }

        .correct-card::before {
            content: "✔️";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.4rem;
            font-weight: bold;
            text-shadow: 0 0 2px rgba(0,0,0,0.2);
        }

        @keyframes pulse-correct {
            0% { transform: scale(0.96); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* الإجابة الخاطئة مشبعة ولكن بلون أحمر قوي */
        .wrong-card {
            background: linear-gradient(135deg, #ff7675, #d63031) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 8px 16px rgba(214, 48, 49, 0.4) !important;
            text-decoration: line-through;
            font-weight: 800;
            position: relative;
            padding-right: 45px;
        }

        .wrong-card::before {
            content: "❌";
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        /* عند عرض الإجابة الصحيحة (حتى بعد اختيار خاطئ) نضيف تأثير وميض إضافي */
        .highlight-correct {
            animation: glowCorrect 0.5s ease-in-out 2;
        }

        @keyframes glowCorrect {
            0% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(0, 184, 148, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 184, 148, 0); }
        }

        .status-pill {
            background: #e6f4f0;
            color: #1f6e5c;
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .flex {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .exp-box {
            background: #fff7e5;
            border-right: 5px solid #f4b942;
            padding: 16px;
            margin-top: 20px;
            border-radius: 24px;
            font-weight: 500;
            color: #7a5a2a;
        }

        .batch-area {
            background: #f3faf7;
            border: 1.5px solid #cae3dc;
            border-radius: 28px;
            padding: 16px;
            margin: 16px 0;
        }

        .question-item {
            background: #ffffff;
            padding: 16px;
            border-radius: 24px;
            margin-bottom: 14px;
            border: 1px solid #e2edf0;
        }

        footer {
            margin-top: 10px;
            padding: 12px;
            color: #528d7c;
            font-weight: 600;
            text-align: center;
            width: 100%;
            font-size: 0.85rem;
            border-top: 1px solid #cfe6df;
        }

        a {
            color: #2c9b7a;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            color: #1f6e5c;
        }

        #singleModal {
            backdrop-filter: blur(8px);
            background: rgba(0, 20, 20, 0.5);
        }

        #singleModal > div {
            background: white;
            border-radius: 44px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.25);
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 800;
            margin: 16px 0 20px;
            color: #1f3e48;
        }

        /* رسالة التغذية الراجعة الصغيرة */
        .feedback-toast {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2a32e6;
            backdrop-filter: blur(8px);
            color: white;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: bold;
            z-index: 1200;
            font-size: 0.9rem;
            pointer-events: none;
            animation: fadeUpDown 1.8s ease forwards;
            box-shadow: 0 6px 14px black;
            border-right: 5px solid #00b894;
        }

        @keyframes fadeUpDown {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- شاشة الدخول -->
    <div id="loginScreen" class="screen active card">
        <h2 style="text-align:center;">🦷 مدرب التشخيص السني</h2>
        <p style="text-align:center; margin-bottom:20px;">بإشراف د. زكريا محمد عطوني</p>
        <input type="text" id="username" placeholder="اسم المستخدم (للطالب)" autocomplete="off">
        <input type="password" id="password" placeholder="كلمة السر">
        <button class="btn" onclick="doLogin()">🎯 دخول</button>
        <p style="margin-top:18px; text-align:center;"><a href="#" onclick="showScreen('registerScreen')">✨ تسجيل جديد (للطلاب)</a></p>
    </div>

    <!-- شاشة التسجيل -->
    <div id="registerScreen" class="screen card">
        <h3 style="color:#1e4a6e;">📝 تسجيل جديد</h3>
        <input type="text" id="regUser" placeholder="الاسم الكامل">
        <input type="password" id="regPass" placeholder="كلمة السر">
        <button class="btn" onclick="doRegister()">إرسال الطلب</button>
        <button class="btn" style="background:#b0c4cf;" onclick="showScreen('loginScreen')">↩️ رجوع</button>
    </div>

    <!-- واجهة الطالب -->
    <div id="studentScreen" class="screen card">
        <div class="flex" style="justify-content: space-between; margin-bottom: 10px;">
            <span class="status-pill" id="qCounter">--</span>
            <span class="status-pill" id="scoreValue">⭐ النقاط: 0</span>
        </div>
        <div id="qText" class="question-text"></div>
        <div id="optionsGrid"></div>
        <div id="expBox" class="exp-box"></div>
        <button class="btn" onclick="logout()">🚪 تسجيل خروج</button>
    </div>

    <!-- واجهة المدير -->
    <div id="adminScreen" class="screen card">
        <h3 style="color:#5f4b8b;">🔧 لوحة الإدارة | د. زكريا</h3>
        <div class="batch-area">
            <button class="btn btn-admin" onclick="toggleBatchJson()">📦 إضافة دفعة JSON</button>
            <div id="batchJsonPanel" style="display:none; margin-top:12px;">
                <textarea id="batchJsonInput" rows="8" placeholder='[{"q": "السؤال هنا", "o": ["خيار1","خيار2","خيار3","خيار4"], "c": "خيار1", "e": "شرح وافي"}]'></textarea>
                <button class="btn btn-admin" onclick="addBatchQuestions()">➕ إضافة الدفعة</button>
            </div>
        </div>
        <button class="btn btn-admin" onclick="showAddSingleForm()">➕ إضافة سؤال واحد</button>
        <div id="adminQuestionsList" style="max-height: 420px; overflow-y: auto; margin-top: 20px;"></div>
        <button class="btn" onclick="logout()">🔒 تسجيل خروج</button>
    </div>

    <!-- مودال الإضافة/التعديل -->
    <div id="singleModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:1000;">
        <div style="background:white; border-radius: 44px; padding:24px; width:90%; max-width:520px;">
            <h3 id="modalTitle" style="color:#1e6f5c;">📌 تفاصيل السؤال</h3>
            <input type="text" id="newQ" placeholder="نص السؤال">
            <input type="text" id="newOpt1" placeholder="الخيار 1">
            <input type="text" id="newOpt2" placeholder="الخيار 2">
            <input type="text" id="newOpt3" placeholder="الخيار 3">
            <input type="text" id="newOpt4" placeholder="الخيار 4">
            <input type="text" id="newCorrect" placeholder="الإجابة الصحيحة (نص مطابق)">
            <textarea id="newExp" rows="2" placeholder="التفسير والتوجيه"></textarea>
            <div class="flex"><button class="btn" id="saveQuestionBtn">💾 حفظ</button><button class="btn" style="background:#ccc; color:#333;" onclick="closeModal()">إلغاء</button></div>
        </div>
    </div>
</div>
<footer>🦷 إعداد الدكتور زكريا محمد عطوني</footer>

<script>
// ------------------- Firebase configuration -------------------
const firebaseConfig = {
    apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
    authDomain: "quizdental-c4d5a.firebaseapp.com",
    projectId: "quizdental-c4d5a",
    databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com/",
    storageBucket: "quizdental-c4d5a.appspot.com",
    messagingSenderId: "750036143183",
    appId: "1:750036143183:web:721a31ef795f973887ee3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentUserType = null;
let questionsList = [];
let quizQuestions = [], quizScore = 0, quizIndex = 0;

window.onload = function() { checkPersistentLogin(); };

async function checkPersistentLogin() {
    const savedUser = localStorage.getItem('dentalQuizUser') || "";
    const savedPass = localStorage.getItem('dentalQuizPass');
    if (savedPass) { await handleLoginLogic(savedUser, savedPass, true); }
}

async function doLogin() {
    let u = document.getElementById('username').value.trim();
    let p = document.getElementById('password').value.trim();
    await handleLoginLogic(u, p, false);
}

async function handleLoginLogic(u, p, isAuto) {
    if(!p) return;
    if(p === "salem1959") {
        currentUserType = 'admin';
        localStorage.setItem('dentalQuizUser', u);
        localStorage.setItem('dentalQuizPass', p);
        await loadQuestions();
        showAdminPanel();
        return;
    }
    if(!u) { if(!isAuto) alert("الرجاء إدخال اسم المستخدم"); return; }
    try {
        let snap = await db.ref('users/'+makeKey(u)).once('value');
        let data = snap.val();
        if(data && data.password === p && data.status === 'active') {
            currentUserType = 'student';
            localStorage.setItem('dentalQuizUser', u);
            localStorage.setItem('dentalQuizPass', p);
            await loadQuestions();
            startStudentQuiz();
        } else {
            if(!isAuto) alert("بيانات الطالب خاطئة أو الحساب غير مفعل");
            if(isAuto) logout(); 
        }
    } catch(e) { console.error(e); }
}

async function doRegister() {
    let u = document.getElementById('regUser').value.trim();
    let p = document.getElementById('regPass').value.trim();
    if(!u || !p) return alert("املأ الحقول");
    await db.ref('users/'+makeKey(u)).set({ name: u, password: p, status: 'pending' });
    alert("تم إرسال الطلب للمدير.");
    showScreen('loginScreen');
}

async function loadQuestions() {
    let snap = await db.ref('questions').once('value');
    let data = snap.val();
    questionsList = data ? Object.entries(data).map(([id,q])=>({...q, firebaseId:id})) : [];
}

function showAdminPanel() { showScreen('adminScreen'); renderAdminList(); }

function renderAdminList() {
    let container = document.getElementById('adminQuestionsList');
    container.innerHTML = questionsList.length ? "" : "<p style='text-align:center; padding:20px;'>📭 لا توجد أسئلة حتى الآن.</p>";
    questionsList.forEach((q,i)=>{
        let div = document.createElement('div');
        div.className = "question-item";
        div.innerHTML = `<div><strong>📌 ${i+1}. ${q.q}</strong></div>
                         <div class="flex" style="margin-top:12px;">
                             <button class="btn" style="background:#ffb347; color:#2d2f36; width:auto;" onclick="editQuestion('${q.firebaseId}')">✏️ تعديل</button>
                             <button class="btn btn-danger" style="width:auto;" onclick="deleteQuestion('${q.firebaseId}')">🗑️ حذف</button>
                         </div>`;
        container.appendChild(div);
    });
}

function startStudentQuiz() {
    if(!questionsList.length) return (alert("⚠️ لا توجد أسئلة في قاعدة البيانات. يرجى إبلاغ المدير."), logout());
    quizQuestions = [...questionsList].sort(()=>Math.random()-0.5);
    quizScore = 0; quizIndex = 0;
    showScreen('studentScreen');
    renderQuiz();
}

function showFeedbackMessage(text, isCorrect) {
    let toast = document.createElement('div');
    toast.className = 'feedback-toast';
    toast.textContent = text;
    if(isCorrect) toast.style.borderRightColor = "#00b894";
    else toast.style.borderRightColor = "#d63031";
    document.body.appendChild(toast);
    setTimeout(() => { if(toast && toast.remove) toast.remove(); }, 1800);
}

function renderQuiz() {
    if(quizIndex >= quizQuestions.length) { 
        alert(`🏆 أكملت الاختبار! مجموع النقاط: ${quizScore} / ${quizQuestions.length*10}`);
        startStudentQuiz(); 
        return; 
    }
    let q = quizQuestions[quizIndex];
    document.getElementById('qCounter').innerText = `📖 س ${quizIndex+1} / ${quizQuestions.length}`;
    document.getElementById('scoreValue').innerHTML = `⭐ النقاط: ${quizScore}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('expBox').style.display = 'none';
    let grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";
    q.o.forEach(opt=>{
        let optionDiv = document.createElement('div');
        optionDiv.className = 'option-card';
        optionDiv.innerText = opt;
        optionDiv.onclick = ()=>{
            if(document.querySelector('.correct-card')) return;
            const isUserCorrect = (opt === q.c);
            if(isUserCorrect) { 
                quizScore += 10;
                optionDiv.classList.add('correct-card');
                showFeedbackMessage("✅ إجابة صحيحة! +10 نقاط", true);
            } else {
                optionDiv.classList.add('wrong-card');
                showFeedbackMessage(`❌ إجابة خاطئة. الإجابة الصحيحة هي: "${q.c}"`, false);
                Array.from(grid.children).forEach(ch => {
                    if(ch.innerText === q.c) {
                        ch.classList.add('correct-card');
                        ch.classList.add('highlight-correct');
                        setTimeout(() => ch.classList.remove('highlight-correct'), 800);
                    }
                });
            }
            document.getElementById('scoreValue').innerHTML = `⭐ النقاط: ${quizScore}`;
            document.getElementById('expBox').innerHTML = `<b>📘 التفسير التعليمي:</b> ${q.e || "لا يوجد تفسير مفصل"}`;
            document.getElementById('expBox').style.display = 'block';
            
            setTimeout(()=>{ quizIndex++; renderQuiz(); }, 2400);
        };
        grid.appendChild(optionDiv);
    });
}

function showScreen(id) { 
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}

function makeKey(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,""); }

function toggleBatchJson() { 
    let p = document.getElementById('batchJsonPanel'); 
    p.style.display = p.style.display==='none'?'block':'none'; 
}

function closeModal() { document.getElementById('singleModal').style.display = 'none'; }

function logout() { localStorage.clear(); location.reload(); }

// دوال الإدارة (إضافة / حذف / تعديل / دفعات)
async function addBatchQuestions() {
    let jsonText = document.getElementById('batchJsonInput').value.trim();
    try {
        let batch = JSON.parse(jsonText);
        for(let item of batch) { 
            if(!item.q || !item.o || !item.c) continue;
            await db.ref('questions').push(item); 
        }
        alert("✅ تمت إضافة الدفعة بنجاح");
        await loadQuestions(); 
        renderAdminList();
        document.getElementById('batchJsonInput').value = '';
    } catch(e) { alert("خطأ في صيغة JSON: تأكد من التنسيق"); }
}

function showAddSingleForm() {
    document.getElementById('modalTitle').innerText = "➕ إضافة سؤال جديد";
    document.querySelectorAll('#singleModal input, #singleModal textarea').forEach(el=>el.value='');
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('saveQuestionBtn').onclick = addSingleQuestion;
}

async function addSingleQuestion() {
    let q = document.getElementById('newQ').value.trim();
    let o = [
        document.getElementById('newOpt1').value.trim(), 
        document.getElementById('newOpt2').value.trim(), 
        document.getElementById('newOpt3').value.trim(), 
        document.getElementById('newOpt4').value.trim()
    ];
    let c = document.getElementById('newCorrect').value.trim();
    let e = document.getElementById('newExp').value.trim();
    if(!q || !c || o.some(opt=>opt==="")) return alert("يرجى ملء السؤال وجميع الخيارات والإجابة الصحيحة.");
    await db.ref('questions').push({q, o, c, e});
    closeModal(); 
    await loadQuestions(); 
    renderAdminList();
}

async function deleteQuestion(id) { 
    if(confirm("⚠️ هل أنت متأكد من حذف هذا السؤال نهائياً؟")) { 
        await db.ref('questions/'+id).remove(); 
        await loadQuestions(); 
        renderAdminList(); 
        alert("تم الحذف"); 
    } 
}

function editQuestion(id) {
    let qq = questionsList.find(x=>x.firebaseId===id);
    if(!qq) return;
    document.getElementById('newQ').value = qq.q;
    document.getElementById('newOpt1').value = qq.o[0] || '';
    document.getElementById('newOpt2').value = qq.o[1] || '';
    document.getElementById('newOpt3').value = qq.o[2] || '';
    document.getElementById('newOpt4').value = qq.o[3] || '';
    document.getElementById('newCorrect').value = qq.c;
    document.getElementById('newExp').value = qq.e || '';
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('modalTitle').innerText = "✏️ تعديل السؤال";
    document.getElementById('saveQuestionBtn').onclick = async () => {
        let nq = document.getElementById('newQ').value.trim();
        let no = [
            document.getElementById('newOpt1').value.trim(),
            document.getElementById('newOpt2').value.trim(),
            document.getElementById('newOpt3').value.trim(),
            document.getElementById('newOpt4').value.trim()
        ];
        let nc = document.getElementById('newCorrect').value.trim();
        let ne = document.getElementById('newExp').value.trim();
        if(!nq || !nc) return alert("السؤال والإجابة الصحيحة مطلوبة");
        await db.ref('questions/'+id).set({q:nq, o:no, c:nc, e:ne});
        closeModal(); 
        await loadQuestions(); 
        renderAdminList();
        alert("تم التحديث");
    };
}
</script>
</body>
</html>
