<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني | د. زكريا عطوني</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/192/tooth.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #e0f2fe, #f0f9ff); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .app { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 10px; }
        .header { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px; padding: 15px 20px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .status-dot { width: 10px; height: 10px; background: #e17055; border-radius: 50%; display: inline-block; }
        .status-dot.ok { background: #00b894; box-shadow: 0 0 8px #00b894; }
        .screen { display: none; animation: fade 0.3s; }
        .screen.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { color: #1e4a6e; text-align: center; margin-bottom: 15px; font-size: 1.4rem; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 20px; border: 1px solid #dceaf2; outline: none; font-size: 1rem; }
        .btn { background: linear-gradient(105deg, #1f7b6e, #2c9b7a); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-admin { background: linear-gradient(105deg, #6c5ce7, #8b5cf6); }
        .btn-danger { background: linear-gradient(105deg, #e17055, #d63031); }
        .option { background: #fafefd; border: 1.5px solid #e2f0ed; padding: 12px 20px; border-radius: 50px; margin: 8px 0; cursor: pointer; font-weight: 600; text-align: right; transition: 0.2s; }
        .option.correct { background: linear-gradient(135deg, #00b894, #009688); color: white; border: none; }
        .option.wrong { background: linear-gradient(135deg, #ff7675, #d63031); color: white; border: none; }
        .exp { background: #fff7e5; border-right: 4px solid #f4b942; padding: 10px; border-radius: 15px; margin-top: 10px; font-size: 0.9rem; color: #7a5a2a; display: none; }
        .pill { background: #e6f4f0; color: #1f6e5c; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px; padding: 12px; text-align: center; color: white; font-size: 0.8rem; }
        .q-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin: 10px 0; border-right: 3px solid #2c9b7a; }
        .correct-badge { background: #d4edda; color: #155724; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin: 5px 0; }
        .user-item { background: #f8fafc; border-radius: 16px; padding: 12px; margin: 10px 0; border-right: 3px solid #6c5ce7; }
        .tag { font-size: 0.75rem; padding: 3px 8px; border-radius: 12px; font-weight: bold; }
        .tag.active { background: #d4edda; color: #155724; }
        .tag.pending { background: #fff3cd; color: #856404; }
        .tag.suspended { background: #e2e3e5; color: #383d41; }
        .badge { background: #d63031; color: white; border-radius: 50%; padding: 2px 8px; font-size: 0.8rem; font-weight: bold; display: none; }
        .collapse { display: none; margin-top: 10px; }
        .collapse.show { display: block; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 0.9rem; display: none; }
        .error.show { display: block; }
        #quizArea { flex: 1; overflow-y: auto; max-height: 400px; padding-right: 5px; }
        .whatsapp-btn { background: linear-gradient(105deg, #25D366, #128C7E); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 24px; font-weight: 700; width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); transition: 0.2s; font-size: 1rem; }
        .whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3); }
    </style>
</head><body>
<div class="app">
    <div class="header">
        <h1>🦷 مدرب التشخيص السني <span id="dot" class="status-dot"></span></h1>
        <p>بإشراف د. زكريا محمد عطوني</p>
    </div>

    <div id="err" class="error"></div>

    <!-- الدخول -->
    <div id="login" class="screen active">
        <div class="card">
            <h2>🎯 تسجيل الدخول</h2>
            <input type="text" id="user" placeholder="اسم المستخدم">
            <input type="password" id="pass" placeholder="كلمة السر">
            <button class="btn" onclick="login()">دخول</button>
            <p style="text-align:center; margin-top:15px;">
                <a href="#" style="color:#2c9b7a;" onclick="show('register')">✨ حساب جديد</a>
            </p>
        </div>
    </div>

    <!-- تسجيل جديد -->
    <div id="register" class="screen">
        <div class="card">
            <h2>📝 تسجيل طالب</h2>
            <input type="text" id="regUser" placeholder="الاسم الكامل">
            <input type="password" id="regPass" placeholder="كلمة السر">
            <button class="btn" onclick="register()">إرسال</button>
            <button class="btn" style="background:#aaa;" onclick="show('login')">رجوع</button>
        </div>
    </div>

    <!-- الطالب -->
    <div id="student" class="screen">
        <div class="card">
            <div class="row">
                <span class="pill" id="qNum">--</span>
                <span class="pill" id="score">⭐ 0</span>
            </div>
            <div id="quizArea">
                <div id="qText" style="font-size:1.2rem; font-weight:800; color:#1f3e48; margin-bottom:15px;"></div>
                <div id="opts"></div>
                <div id="exp" class="exp"></div>
            </div>
            <button class="btn" style="background:#e2edf0; color:#4a5568;" onclick="logout()">🚪 خروج</button>
        </div>
    </div>

    <!-- الإدارة -->    <div id="admin" class="screen">
        <div class="card">
            <h3 style="color:#5f4b8b; margin-bottom:10px;">🔧 الإدارة</h3>
            <div style="max-height:450px; overflow-y:auto;">
                <h4 style="margin:15px 0 10px; color:#1e4a6e;">👥 الطلاب</h4>
                <button class="btn btn-admin" onclick="toggleUsers()">📂 القائمة <span id="reqBadge" class="badge">0</span></button>
                <div id="usersList" class="collapse"></div>
                
                <h4 style="margin:20px 0 10px; color:#1e4a6e;">📝 الأسئلة</h4>
                <button class="btn btn-admin" onclick="toggleJson()">📦 JSON</button>
                <div id="jsonPanel" style="display:none; margin:10px 0;">
                    <textarea id="jsonInput" rows="4" style="font-family:monospace; direction:ltr;" placeholder='[{"q":"؟","o":["أ","ب","ج","د"],"c":"أ","e":"تفسير"}]'></textarea>
                    <button class="btn btn-admin" onclick="addJson()">➕ إضافة</button>
                </div>
                <button class="btn btn-admin" onclick="addOne()">➕ سؤال واحد</button>
                <button class="btn btn-danger" onclick="delAll()">🗑️ حذف الكل</button>
                <div id="qList"></div>
            </div>
            <button class="btn" style="margin-top:10px;" onclick="logout()">🚪 خروج</button>
        </div>
    </div>

    <a href="https://wa.me/963939436998" target="_blank" class="whatsapp-btn">💬 تواصل معنا عبر واتساب</a>

    <div class="footer">🦷 د. زكريا عطوني | © 2026</div>
</div>

<!-- مودال السؤال -->
<div id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100; padding:15px;">
    <div class="card" style="width:100%; max-width:450px; max-height:90vh; overflow-y:auto;">
        <h3 id="mTitle">سؤال</h3>
        <input id="mQ" placeholder="السؤال">
        <input id="m1" placeholder="خيار 1"><input id="m2" placeholder="خيار 2">
        <input id="m3" placeholder="خيار 3"><input id="m4" placeholder="خيار 4">
        <input id="mC" placeholder="الإجابة الصحيحة" style="background:#e8f0fe;">
        <textarea id="mE" rows="2" placeholder="التفسير"></textarea>
        <div class="row" style="margin-top:10px;">
            <button class="btn" id="mSave">💾 حفظ</button>
            <button class="btn" style="background:#ccc;" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
// ⚙️ Firebase
const cfg = { apiKey:"AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA", authDomain:"quizdental-c4d5a.firebaseapp.com", projectId:"quizdental-c4d5a", databaseURL:"https://quizdental-c4d5a-default-rtdb.firebaseio.com/", storageBucket:"quizdental-c4d5a.appspot.com", messagingSenderId:"750036143183", appId:"1:750036143183:web:721a31ef795f973887ee3a" };
firebase.initializeApp(cfg);
const db = firebase.database();

// 🔗 حالة الاتصال
db.ref('.info/connected').on('value', s => {
    document.getElementById('dot').className = 'status-dot' + (s.val()?' ok':'');});

// 🗃️ متغيرات
let Qs = [], quiz = [], score = 0, qi = 0, editId = null, pending = 0, usersRef = null;

// 🔐 مفاتيح التخزين
const K = { U:'dq_u', P:'dq_p' };

// 🚀 البدء - بدون انتظار!
window.onload = () => {
    show('login');
    // محاولة الدخول التلقائي في الخلفية
    autoLogin().catch(()=>{});
};

// 🔁 الدخول التلقائي
async function autoLogin() {
    const u = localStorage.getItem(K.U), p = localStorage.getItem(K.P);
    if (!u || !p) return;
    try {
        if (p === 'salem1959') { await loadQs(); show('admin'); renderAdmin(); listenUsers(); return true; }
        const snap = await db.ref('users/'+key(u)).once('value');
        const d = snap.val();
        if (d && d.password === p && d.status === 'active') {
            await loadQs(); startQuiz(); return true;
        }
    } catch(e) { console.log('Auto-login failed:', e.message); }
    return false;
}

// 🎯 تسجيل الدخول
async function login() {
    const u = document.getElementById('user').value.trim();
    const p = document.getElementById('pass').value.trim();
    if (!u || !p) return alert('أدخل البيانات');
    
    try {
        if (p === 'salem1959') {
            localStorage.setItem(K.U, u); localStorage.setItem(K.P, p);
            await loadQs(); show('admin'); renderAdmin(); listenUsers(); return;
        }
        const snap = await db.ref('users/'+key(u)).once('value');
        const d = snap.val();
        if (d && d.password === p && d.status === 'active') {
            localStorage.setItem(K.U, u); localStorage.setItem(K.P, p);
            await loadQs(); startQuiz();
        } else {
            alert(d?.status === 'pending' ? '⏳ الحساب قيد المراجعة' : d?.status === 'suspended' ? '🚫 الحساب موقوف' : '❌ بيانات غير صحيحة');
        }
    } catch (e) {        showError('⚠️ خطأ في الاتصال: ' + e.message);
    }
}

// 📝 تسجيل جديد
async function register() {
    const n = document.getElementById('regUser').value.trim();
    const p = document.getElementById('regPass').value.trim();
    if (!n || !p) return alert('أكمل البيانات');
    try {
        await db.ref('users/'+key(n)).set({ name:n, password:p, status:'pending', at:Date.now() });
        alert('✅ تم الإرسال'); show('login');
    } catch(e) { alert('❌ '+e.message); }
}

// 📥 تحميل الأسئلة
async function loadQs() {
    const snap = await db.ref('questions').once('value');
    const d = snap.val();
    Qs = d ? Object.entries(d).map(([id,q])=>({...q, id})) : [];
}

// 🎮 بدء الاختبار
function startQuiz() {
    if (!Qs.length) { alert('لا توجد أسئلة'); logout(); return; }
    quiz = [...Qs].sort(()=>Math.random()-0.5);
    score = 0; qi = 0; show('student'); renderQ();
}

// 🖥️ عرض السؤال
function renderQ() {
    if (qi >= quiz.length) { alert(`🎉 انتهى! نتيجتك: ${score}/${quiz.length*10}`); startQuiz(); return; }
    const q = quiz[qi];
    document.getElementById('qNum').innerText = `س ${qi+1}/${quiz.length}`;
    document.getElementById('score').innerText = `⭐ ${score}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('exp').style.display = 'none';
    const opts = document.getElementById('opts'); opts.innerHTML = '';
    [...q.o].sort(()=>Math.random()-0.5).forEach(opt => {
        const div = document.createElement('div');
        div.className = 'option'; div.innerText = opt;
        div.onclick = () => {
            if (opts.querySelector('.correct,.wrong')) return;
            if (opt === q.c) { score += 10; div.classList.add('correct'); }
            else { div.classList.add('wrong'); [...opts.children].forEach(c=>{ if(c.innerText===q.c) c.classList.add('correct'); }); }
            document.getElementById('score').innerText = `⭐ ${score}`;
            const exp = document.getElementById('exp');
            exp.innerHTML = `<b>📘 التفسير:</b><br>${q.e}`; exp.style.display = 'block';
            setTimeout(()=>{ qi++; renderQ(); }, 1800);
        };        opts.appendChild(div);
    });
}

// 🔧 الإدارة
function showAdmin() { show('admin'); renderAdmin(); listenUsers(); }

function renderAdmin() {
    const c = document.getElementById('qList');
    if (!Qs.length) { c.innerHTML = '<p style="text-align:center;color:#888">📭 لا توجد أسئلة</p>'; return; }
    c.innerHTML = '';
    Qs.forEach((q,i) => {
        const div = document.createElement('div'); div.className = 'q-item';
        div.innerHTML = `<div><strong>${i+1}. ${q.q}</strong></div><div class="correct-badge">✅ ${q.c}</div>
        <div class="row" style="margin-top:8px;">
            <button class="btn" style="background:#ffb703;color:#000;width:auto;padding:6px 15px;" onclick="editQ('${q.id}')">✏️</button>
            <button class="btn" style="background:#e17055;width:auto;padding:6px 15px;" onclick="delQ('${q.id}')">🗑️</button>
        </div>`;
        c.appendChild(div);
    });
}

// 👥 المستخدمين
function listenUsers() {
    if (usersRef) db.ref('users').off('value', usersRef);
    usersRef = db.ref('users').on('value', snap => {
        const d = snap.val(), c = document.getElementById('usersList');
        if (!c) return;
        if (!d) { c.innerHTML = '<p style="text-align:center;color:#888">📭 لا يوجد طلاب</p>'; pending = 0; updBadge(); return; }
        pending = 0; c.innerHTML = '';
        Object.entries(d).forEach(([k,u]) => {
            if (u.status === 'pending') pending++;
            const st = {active:['✅ نشط','active'],pending:['⏳ انتظار','pending'],suspended:['⏸️ موقوف','suspended']}[u.status]||['؟',''];
            const div = document.createElement('div'); div.className = 'user-item';
            div.innerHTML = `<div class="row"><strong>👤 ${u.name}</strong><span class="tag ${st[1]}">${st[0]}</span></div>
            <div style="font-size:0.85rem;color:#666;margin:8px 0;">🔐 ${u.password}</div>
            <div class="row" style="gap:5px;">
                ${u.status!=='active' ? `<button class="btn" style="background:#00b894;width:auto;padding:5px 10px;font-size:0.8rem;" onclick="setSt('${k}','active')">✅</button>`:''}
                ${u.status!=='suspended' ? `<button class="btn" style="background:#fdcb6e;color:#000;width:auto;padding:5px 10px;font-size:0.8rem;" onclick="setSt('${k}','suspended')">⏸️</button>`:''}
                <button class="btn" style="background:#d63031;width:auto;padding:5px 10px;font-size:0.8rem;" onclick="delU('${k}','${u.name}')">🗑️</button>
            </div>`;
            c.appendChild(div);
        });
        updBadge();
    });
}

function updBadge() {
    const b = document.getElementById('reqBadge');
    b.innerText = pending; b.style.display = pending>0?'inline-block':'none';}

function toggleUsers() { document.getElementById('usersList').classList.toggle('show'); }

async function setSt(k, st) { if (confirm('تأكيد؟')) await db.ref('users/'+k).update({status:st}); }
async function delU(k, n) { if (confirm(`حذف "${n}"؟`)) await db.ref('users/'+k).remove(); }

// ❓ الأسئلة
async function delQ(id) { if (confirm('حذف؟')) { await db.ref('questions/'+id).remove(); await loadQs(); renderAdmin(); } }
async function delAll() { if (!confirm(`حذف جميع الأسئلة (${Qs.length})؟`)) return; 
    const up = {}; Qs.forEach(q=>up[`questions/${q.id}`]=null); await db.ref().update(up); await loadQs(); renderAdmin(); alert('✅ تم'); }

function toggleJson() { const p = document.getElementById('jsonPanel'); p.style.display = p.style.display==='none'?'block':'none'; }

async function addJson() {
    const t = document.getElementById('jsonInput').value.trim(); if (!t) return alert('ألصق JSON');
    let arr; try { arr = JSON.parse(t); } catch(e) { return alert('❌ '+e.message); }
    if (!Array.isArray(arr)) return alert('يجب أن تكون مصفوفة [...]');
    let ok = 0, err = 0;
    for (const it of arr) {
        if (!it.q || !it.o || !it.c || !it.e || !Array.isArray(it.o) || it.o.length!==4 || !it.o.includes(it.c)) { err++; continue; }
        try { await db.ref('questions').push({q:it.q, o:it.o, c:it.c, e:it.e}); ok++; } catch { err++; }
    }
    alert(`✅ ${ok} | ❌ ${err}`); toggleJson(); await loadQs(); renderAdmin();
}

// ➕ سؤال واحد
function addOne() {
    editId = null; document.getElementById('mTitle').innerText = '➕ جديد';
    ['mQ','m1','m2','m3','m4','mC','mE'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('mSave').onclick = saveOne;
}

async function saveOne() {
    const q = document.getElementById('mQ').value.trim();
    const o = [1,2,3,4].map(i=>document.getElementById('m'+i).value.trim());
    const c = document.getElementById('mC').value.trim();
    const e = document.getElementById('mE').value.trim();
    if (!q || o.some(v=>!v) || !c || !e) return alert('أكمل الحقول');
    if (!o.includes(c)) return alert('الإجابة يجب أن تكون في الخيارات');
    try {
        await db.ref('questions').push({q,o,c,e});
        alert('✅ تمت'); closeModal(); await loadQs(); if (document.getElementById('admin').classList.contains('active')) renderAdmin();
    } catch(err) { alert('❌ '+err.message); }
}

// ✏️ تعديل
function editQ(id) {
    const q = Qs.find(x=>x.id===id); if (!q) return;    editId = id; document.getElementById('mTitle').innerText = '✏️ تعديل';
    document.getElementById('mQ').value = q.q;
    q.o.forEach((v,i)=>document.getElementById('m'+(i+1)).value = v);
    document.getElementById('mC').value = q.c; document.getElementById('mE').value = q.e;
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('mSave').onclick = () => updQ(id);
}

async function updQ(id) {
    const q = document.getElementById('mQ').value.trim();
    const o = [1,2,3,4].map(i=>document.getElementById('m'+i).value.trim());
    const c = document.getElementById('mC').value.trim();
    const e = document.getElementById('mE').value.trim();
    if (!q || o.some(v=>!v) || !c || !e) return alert('أكمل الحقول');
    if (!o.includes(c)) return alert('الإجابة في الخيارات');
    try {
        await db.ref('questions/'+id).set({q,o,c,e});
        alert('✅ تم'); closeModal(); await loadQs(); renderAdmin();
    } catch(err) { alert('❌ '+err.message); }
}

function closeModal() { document.getElementById('modal').style.display = 'none'; editId = null; }

// 🧭 أدوات
function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function key(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,''); }
function showError(m) { const e = document.getElementById('err'); e.innerText = m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'), 4000); }

// 🚪 الخروج
function logout() {
    if (usersRef) db.ref('users').off('value', usersRef);
    localStorage.removeItem(K.U); localStorage.removeItem(K.P);
    Qs = []; quiz = []; score = 0; qi = 0;
    show('login'); document.getElementById('user').value = ''; document.getElementById('pass').value = '';
}
</script>
</body>
</html>
