<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدرب التشخيص السني | د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            background: transparent;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* الهيدر */
        .app-header {
            background: linear-gradient(135deg, #1e4a6e, #2c9b7a);
            border-radius: 24px;
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .app-header h1 {
            color: white;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .app-header p {
            color: rgba(255,255,255,0.9);
            font-size: 0.85rem;
        }

        .screen {
            display: none;
            animation: fadeSlideUp 0.3s ease-out;
        }

        .active { display: block; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(66, 153, 225, 0.15);
        }

        /* شاشة الطالب تحتاج ارتفاع محدد */
        #studentScreen .card {
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .quiz-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin: 15px 0;
            max-height: 400px;
        }

        h2 {
            color: #1e4a6e;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #1f3e48;
            line-height: 1.4;
        }

        .option-card {
            background: #fafefd;
            border: 1.5px solid #e2f0ed;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 8px;
            text-align: right;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .correct-card {
            background: linear-gradient(135deg, #00b894, #009688) !important;
            color: white !important;
            border: none !important;
        }

        .wrong-card {
            background: linear-gradient(135deg, #ff7675, #d63031) !important;
            color: white !important;
            border: none !important;
        }

        .exp-box {
            background: #fff7e5;
            border-right: 4px solid #f4b942;
            padding: 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-top: 5px;
            color: #7a5a2a;
        }

        .status-pill {
            background: #e6f4f0;
            color: #1f6e5c;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .flex-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px; 
            gap: 10px; 
            flex-wrap: wrap; 
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 20px;
            border: 1px solid #dceaf2;
            outline: none;
        }

        .btn {
            background: linear-gradient(105deg, #1f7b6e, #2c9b7a);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-admin { background: linear-gradient(105deg, #6c5ce7, #8b5cf6); }
        .btn-danger { background: linear-gradient(105deg, #e17055, #d63031); }
        .btn-warning { background: linear-gradient(105deg, #f39c12, #e67e22); color: #000; }

        /* الفوتر */
        .app-footer {
            background: linear-gradient(135deg, #1e4a6e, #2c9b7a);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .quiz-content::-webkit-scrollbar { width: 4px; }
        .quiz-content::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
            border-right: 3px solid #2c9b7a;
        }
        
        .correct-badge {
            background: #d4edda;
            color: #155724;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: inline-block;
            margin: 6px 0;
        }
        
        .batch-area { 
            background: #f1f5f9; 
            border-radius: 20px; 
            padding: 10px; 
            margin: 10px 0; 
        }
        
        textarea.batch-json { 
            font-family: monospace; 
            direction: ltr; 
            text-align: left; 
            font-size: 0.8rem; 
        }

        .admin-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- الهيدر - يظهر في جميع الشاشات -->
    <div class="app-header">
        <h1>🦷 مدرب التشخيص السني</h1>
        <p>بإشراف د. زكريا محمد عطوني</p>
    </div>

    <!-- شاشة الدخول -->
    <div id="loginScreen" class="screen active">
        <div class="card">
            <h2>🎯 تسجيل الدخول</h2>
            <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="password" placeholder="كلمة السر">
            <button class="btn" onclick="doLogin()">دخول</button>
            <p style="margin-top:15px; text-align:center;">
                <a href="#" style="color:#2c9b7a; font-size:0.85rem; text-decoration:none;" onclick="showScreen('registerScreen')">✨ إنشاء حساب طالب جديد</a>
            </p>
        </div>
    </div>

    <!-- شاشة التسجيل -->
    <div id="registerScreen" class="screen">
        <div class="card">
            <h2>📝 تسجيل جديد</h2>
            <input type="text" id="regUser" placeholder="الاسم الكامل">
            <input type="password" id="regPass" placeholder="كلمة السر">
            <button class="btn" onclick="doRegister()">إرسال الطلب</button>
            <button class="btn" style="background:#aaa;" onclick="showScreen('loginScreen')">رجوع</button>
        </div>
    </div>

    <!-- شاشة الطالب -->
    <div id="studentScreen" class="screen">
        <div class="card">
            <div class="flex-row">
                <span class="status-pill" id="qCounter">--</span>
                <span class="status-pill" id="scoreValue">⭐ 0</span>
            </div>
            <div class="quiz-content" id="quizScrollArea">
                <div id="qText" class="question-text"></div>
                <div id="optionsGrid"></div>
                <div id="expBox" class="exp-box" style="display:none;"></div>
            </div>
            <button class="btn" style="background:#e2edf0; color:#4a5568;" onclick="logout()">🚪 خروج</button>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="adminScreen" class="screen">
        <div class="card">
            <h3 style="margin-bottom:10px; color:#5f4b8b;">🔧 لوحة الإدارة</h3>
            <div class="quiz-content" id="adminList" style="max-height: 400px;">
                <div class="batch-area">
                    <button class="btn btn-admin" onclick="toggleBatchJson()">📦 إضافة دفعة JSON (50+ سؤال)</button>
                    <div id="batchJsonPanel" style="display:none; margin-top:10px;">
                        <textarea id="batchJsonInput" rows="6" class="batch-json" placeholder='[
  {
    "q": "ما هو التسوس السني؟",
    "o": ["مرض بكتيري", "مرض فيروسي", "مرض فطري", "مرض وراثي"],
    "c": "مرض بكتيري",
    "e": "التسوس هو مرض بكتيري متعدد العوامل"
  }
]'></textarea>
                        <button class="btn btn-admin" onclick="addBatchQuestions()">➕ إضافة الدفعة</button>
                        <button class="btn" style="background:#aaa;" onclick="toggleBatchJson()">إلغاء</button>
                    </div>
                </div>
                <div class="admin-buttons">
                    <button class="btn btn-admin" onclick="showAddSingleForm()">➕ إضافة سؤال واحد</button>
                    <button class="btn btn-danger" onclick="deleteAllQuestions()">🗑️ حذف جميع الأسئلة</button>
                </div>
                <div id="adminQuestionsList" style="margin-top: 15px;"></div>
            </div>
            <button class="btn" style="margin-top: 10px;" onclick="logout()">🚪 تسجيل خروج</button>
        </div>
    </div>

    <!-- الفوتر - يظهر في جميع الشاشات -->
    <div class="app-footer">
        🦷 إعداد الدكتور زكريا محمد عطوني | جميع الحقوق محفوظة © 2026
    </div>
</div>

<!-- مودال الإضافة / التعديل -->
<div id="singleModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100; padding:15px;">
    <div class="card" style="flex:0 1 auto; width:100%; max-width:450px; max-height:90vh; overflow-y:auto;">
        <h3 id="modalTitle">📌 إضافة سؤال</h3>
        <input type="text" id="newQ" placeholder="نص السؤال">
        <input type="text" id="newOpt1" placeholder="خيار 1">
        <input type="text" id="newOpt2" placeholder="خيار 2">
        <input type="text" id="newOpt3" placeholder="خيار 3">
        <input type="text" id="newOpt4" placeholder="خيار 4">
        <input type="text" id="newCorrect" placeholder="الإجابة الصحيحة (نص مطابق)" style="background:#e8f0fe;">
        <textarea id="newExp" rows="2" placeholder="التفسير السريري"></textarea>
        <div class="flex-row" style="margin-top:10px; gap:10px;">
            <button class="btn" id="saveQuestionBtn">💾 حفظ</button>
            <button class="btn" style="background:#ccc;" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
    authDomain: "quizdental-c4d5a.firebaseapp.com",
    projectId: "quizdental-c4d5a",
    databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com/",
    storageBucket: "quizdental-c4d5a.appspot.com",
    messagingSenderId: "750036143183",
    appId: "1:750036143183:web:721a31ef795f973887ee3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questionsList = [], quizQuestions = [], quizScore = 0, quizIndex = 0;
let editModeId = null;

window.onload = checkPersistentLogin;

async function checkPersistentLogin() {
    const u = localStorage.getItem('dentalQuizUser'), p = localStorage.getItem('dentalQuizPass');
    if (u && p) await handleLoginLogic(u, p, true);
}

async function doLogin() {
    const u = document.getElementById('username').value.trim(), p = document.getElementById('password').value.trim();
    await handleLoginLogic(u, p, false);
}

async function handleLoginLogic(u, p, isAuto) {
    if(!p) return;
    if(p === "salem1959") {
        localStorage.setItem('dentalQuizUser', u); localStorage.setItem('dentalQuizPass', p);
        await loadQuestions(); showAdminPanel(); return;
    }
    try {
        let snap = await db.ref('users/'+makeKey(u)).once('value');
        let data = snap.val();
        if(data && data.password === p && data.status === 'active') {
            localStorage.setItem('dentalQuizUser', u); localStorage.setItem('dentalQuizPass', p);
            await loadQuestions(); startStudentQuiz();
        } else if(!isAuto) alert("❌ الحساب خاطئ أو غير مفعل");
    } catch(e) { console.error(e); alert("حدث خطأ في الاتصال"); }
}

async function doRegister() {
    let u = document.getElementById('regUser').value.trim();
    let p = document.getElementById('regPass').value.trim();
    if(!u || !p) return alert("❌ املأ جميع الحقول");
    await db.ref('users/'+makeKey(u)).set({ name: u, password: p, status: 'pending' });
    alert("✅ تم إرسال الطلب. سيتم تفعيله من قبل المدير.");
    showScreen('loginScreen');
}

async function loadQuestions() {
    let snap = await db.ref('questions').once('value');
    let data = snap.val();
    questionsList = data ? Object.entries(data).map(([id,q])=>({...q, firebaseId:id})) : [];
}

function startStudentQuiz() {
    if(!questionsList.length) { 
        alert("⚠️ لا توجد أسئلة بعد، يرجى إضافة أسئلة من لوحة الإدارة."); 
        logout(); 
        return; 
    }
    quizQuestions = [...questionsList].sort(()=>Math.random()-0.5);
    quizScore = 0; quizIndex = 0;
    showScreen('studentScreen');
    renderQuiz();
}

function renderQuiz() {
    if(quizIndex >= quizQuestions.length) { 
        alert(`🎉 تهانينا! لقد أكملت الاختبار\n⭐ نقاطك: ${quizScore} من ${quizQuestions.length*10}`);
        startStudentQuiz(); 
        return; 
    }
    let q = quizQuestions[quizIndex];
    document.getElementById('qCounter').innerText = `س ${quizIndex+1}/${quizQuestions.length}`;
    document.getElementById('scoreValue').innerHTML = `⭐ ${quizScore}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('expBox').style.display = 'none';
    let grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";

    let shuffledOptions = [...q.o].sort(() => Math.random() - 0.5);
    shuffledOptions.forEach(opt=>{
        let div = document.createElement('div');
        div.className = 'option-card';
        div.innerText = opt;
        div.onclick = ()=>{
            if(document.querySelector('.correct-card')) return;
            if(opt === q.c) { 
                quizScore += 10;
                div.classList.add('correct-card');
            } else {
                div.classList.add('wrong-card');
                Array.from(grid.children).forEach(ch => {
                    if(ch.innerText === q.c) ch.classList.add('correct-card');
                });
            }
            document.getElementById('scoreValue').innerHTML = `⭐ ${quizScore}`;
            document.getElementById('expBox').innerHTML = `<b>📘 التفسير السريري:</b><br>${q.e || "لا يوجد تفسير"}`;
            document.getElementById('expBox').style.display = 'block';
            setTimeout(()=>{ quizIndex++; renderQuiz(); }, 2000);
        };
        grid.appendChild(div);
    });
}

function showAdminPanel() { 
    showScreen('adminScreen'); 
    renderAdminList(); 
}

function renderAdminList() {
    let container = document.getElementById('adminQuestionsList');
    if(!container) return;
    if(questionsList.length === 0) { 
        container.innerHTML = "<p style='text-align:center; color:#888;'>📭 لا توجد أسئلة. أضف دفعة JSON أو سؤالاً واحداً.</p>"; 
        return; 
    }
    container.innerHTML = "";
    questionsList.forEach((q, idx) => {
        let div = document.createElement('div');
        div.className = "question-item";
        div.innerHTML = `
            <div><strong>${idx+1}. ${q.q}</strong></div>
            <div class="correct-badge">✅ الإجابة الصحيحة: ${q.c}</div>
            <div class="flex-row" style="margin-top: 8px;">
                <button class="btn" style="background:#ffb703; color:#000; width:auto; padding:6px 15px;" onclick="editQuestion('${q.firebaseId}')">✏️ تعديل</button>
                <button class="btn" style="background:#e17055; width:auto; padding:6px 15px;" onclick="deleteQuestion('${q.firebaseId}')">🗑️ حذف</button>
            </div>
        `;
        container.appendChild(div);
    });
}

async function deleteQuestion(id) { 
    if(confirm("⚠️ هل أنت متأكد من حذف هذا السؤال نهائياً؟")) { 
        await db.ref('questions/'+id).remove(); 
        await loadQuestions(); 
        renderAdminList(); 
    } 
}

async function deleteAllQuestions() {
    if(!confirm("⚠️ تحذير خطير! سيتم حذف جميع الأسئلة نهائياً. هل أنت متأكد؟")) return;
    const updates = {};
    questionsList.forEach(q => { updates[`questions/${q.firebaseId}`] = null; });
    await db.ref().update(updates);
    await loadQuestions();
    renderAdminList();
    alert("✅ تم حذف جميع الأسئلة.");
}

function toggleBatchJson() {
    let panel = document.getElementById('batchJsonPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if(panel.style.display === 'block') document.getElementById('batchJsonInput').value = '';
}

async function addBatchQuestions() {
    let jsonText = document.getElementById('batchJsonInput').value.trim();
    if(!jsonText) return alert("❌ الرجاء لصق مصفوفة JSON.");
    let batch;
    try { batch = JSON.parse(jsonText); }
    catch(e) { return alert("❌ خطأ في صيغة JSON: " + e.message); }
    if(!Array.isArray(batch)) return alert("❌ يجب أن تكون البيانات مصفوفة (array).");
    if(batch.length === 0) return alert("❌ المصفوفة فارغة.");
    let added = 0, errors = 0;
    for(let item of batch) {
        if(!item.q || !item.o || !item.c || !item.e) { errors++; continue; }
        if(!Array.isArray(item.o) || item.o.length !== 4) { errors++; continue; }
        if(!item.o.includes(item.c)) { errors++; continue; }
        await db.ref('questions').push({ q: item.q, o: item.o, c: item.c, e: item.e });
        added++;
    }
    alert(`✅ تمت إضافة ${added} سؤال بنجاح\n❌ فشل ${errors} سؤال`);
    toggleBatchJson();
    await loadQuestions();
    renderAdminList();
}

function showAddSingleForm() {
    editModeId = null;
    document.getElementById('modalTitle').innerText = "➕ إضافة سؤال جديد";
    document.getElementById('newQ').value = '';
    document.getElementById('newOpt1').value = '';
    document.getElementById('newOpt2').value = '';
    document.getElementById('newOpt3').value = '';
    document.getElementById('newOpt4').value = '';
    document.getElementById('newCorrect').value = '';
    document.getElementById('newExp').value = '';
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('saveQuestionBtn').onclick = () => addSingleQuestion();
}

async function addSingleQuestion() {
    let q = document.getElementById('newQ').value.trim();
    let o = [
        document.getElementById('newOpt1').value.trim(),
        document.getElementById('newOpt2').value.trim(),
        document.getElementById('newOpt3').value.trim(),
        document.getElementById('newOpt4').value.trim()
    ];
    let c = document.getElementById('newCorrect').value.trim();
    let e = document.getElementById('newExp').value.trim();
    if(!q || o.some(v=>!v) || !c || !e) return alert("❌ املأ جميع الحقول.");
    if(!o.includes(c)) return alert("⚠️ الإجابة الصحيحة غير موجودة في الخيارات الأربعة.");
    await db.ref('questions').push({ q, o, c, e });
    alert("✅ تمت الإضافة بنجاح.");
    closeModal();
    await loadQuestions();
    renderAdminList();
}

function editQuestion(id) {
    let qObj = questionsList.find(q => q.firebaseId === id);
    if(!qObj) return;
    editModeId = id;
    document.getElementById('modalTitle').innerText = "✏️ تعديل السؤال";
    document.getElementById('newQ').value = qObj.q;
    document.getElementById('newOpt1').value = qObj.o[0];
    document.getElementById('newOpt2').value = qObj.o[1];
    document.getElementById('newOpt3').value = qObj.o[2];
    document.getElementById('newOpt4').value = qObj.o[3];
    document.getElementById('newCorrect').value = qObj.c;
    document.getElementById('newExp').value = qObj.e;
    document.getElementById('singleModal').style.display = 'flex';
    document.getElementById('saveQuestionBtn').onclick = () => updateQuestion(id);
}

async function updateQuestion(id) {
    let q = document.getElementById('newQ').value.trim();
    let o = [
        document.getElementById('newOpt1').value.trim(),
        document.getElementById('newOpt2').value.trim(),
        document.getElementById('newOpt3').value.trim(),
        document.getElementById('newOpt4').value.trim()
    ];
    let c = document.getElementById('newCorrect').value.trim();
    let e = document.getElementById('newExp').value.trim();
    if(!q || o.some(v=>!v) || !c || !e) return alert("❌ املأ جميع الحقول.");
    if(!o.includes(c)) return alert("⚠️ الإجابة الصحيحة غير موجودة في الخيارات.");
    await db.ref('questions/'+id).set({ q, o, c, e });
    alert("✅ تم التعديل بنجاح.");
    closeModal();
    await loadQuestions();
    renderAdminList();
}

function closeModal() { document.getElementById('singleModal').style.display = 'none'; editModeId = null; }

function showScreen(id) { 
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}

function makeKey(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,""); }

function logout() { 
    localStorage.clear(); 
    location.reload(); 
}
</script>
</body>
</html>
