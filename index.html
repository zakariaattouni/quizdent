<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدرب التشخيص السني - د. زكريا عطوني</title>

<!-- PWA Manifest -->
<link rel="manifest" href='data:application/json,{"name":"مدرب التشخيص السني","short_name":"التشخيص السني","start_url":".","display":"standalone","background_color":"#ffffff","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/3063/3063162.png","sizes":"192x192","type":"image/png"}]}'>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{background:linear-gradient(135deg,#e0f2fe,#f0f9ff);min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
.header{background:linear-gradient(135deg,#1e4a6e,#2c9b7a);border-radius:20px;padding:20px;text-align:center;color:#fff;margin-bottom:15px}
.card{background:#fff;border-radius:20px;padding:25px;box-shadow:0 10px 25px rgba(0,0,0,0.1);margin-bottom:15px}
.btn{background:linear-gradient(135deg,#2c9b7a,#1e4a6e);color:#fff;border:none;padding:12px 20px;border-radius:40px;font-weight:bold;cursor:pointer;width:100%;margin-top:10px;font-size:16px}
.btn-admin{background:linear-gradient(135deg,#6c5ce7,#8b5cf6)}
.btn-danger{background:linear-gradient(135deg,#e17055,#d63031)}
.option{background:#f0fdf4;border:2px solid #cce5dc;padding:12px 18px;border-radius:50px;margin:10px 0;cursor:pointer;transition:all 0.2s;font-weight:500}
.option:hover{background:#d1fae5;transform:translateX(-5px)}
.option.correct{background:#00b894;color:#fff;border-color:#00b894}
.option.wrong{background:#ff7675;color:#fff;border-color:#ff7675}
.exp-box{background:#fef9e3;border-right:4px solid #f4b942;padding:15px;border-radius:12px;margin-top:15px;display:none}
.pill{display:inline-block;background:#e6f4f0;color:#1e4a6e;padding:5px 15px;border-radius:20px;font-size:14px;font-weight:bold}
.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;flex-wrap:wrap;gap:10px}
.q-text{font-size:1.2rem;font-weight:bold;color:#1e4a6e;margin-bottom:20px;line-height:1.5}
.score-area{background:#2c9b7a;color:#fff;padding:5px 15px;border-radius:20px}
.result-score{font-size:2rem;font-weight:bold;color:#2c9b7a}
.wrong-item{background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:12px;margin:10px 0}
.screen{display:none}
.screen.active{display:block}
.q-item{background:#f8fafc;border-radius:16px;padding:15px;margin:10px 0;border-right:3px solid #2c9b7a}
.user-item{background:#f8fafc;border-radius:16px;padding:15px;margin:10px 0;border-right:3px solid #6c5ce7}
.tag{padding:3px 10px;border-radius:12px;font-size:12px}
.tag-active{background:#d4edda;color:#155724}
.tag-pending{background:#fff3cd;color:#856404}
.tag-suspended{background:#f8d7da;color:#721c24}
input,textarea{width:100%;padding:12px;margin:8px 0;border:1px solid #ddd;border-radius:12px;font-size:14px}
.loading{display:inline-block;width:16px;height:16px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🦷 مدرب التشخيص السني</h1>
        <p>إعداد الدكتور زكريا محمد عطوني</p>
        <div style="font-size:12px;margin-top:5px" id="connectionStatus">🟢 متصل</div>
    </div>
    <!-- شاشة البداية -->
    <div id="landingScreen" class="screen active">
        <div class="card" style="text-align:center">
            <h2 style="color:#1e4a6e;margin-bottom:20px">مرحباً بك</h2>
            <button class="btn" onclick="showLogin()">👨‍⚕️ دخول</button>
            <button class="btn" style="margin-top:10px" onclick="showRegister()">📝 تسجيل جديد</button>
            <button class="btn btn-admin" style="margin-top:10px" onclick="showAdminLogin()">🛡️ إدارة</button>
        </div>
    </div>
    <!-- شاشة تسجيل الدخول -->
    <div id="loginScreen" class="screen">
        <div class="card">
            <h2 style="text-align:center;color:#1e4a6e">تسجيل الدخول</h2>
            <input type="text" id="loginUsername" placeholder="اسم المستخدم">
            <input type="password" id="loginPassword" placeholder="كلمة السر">
            <button class="btn" onclick="doLogin()">دخول</button>
            <button class="btn btn-outline" style="background:#ccc;color:#333" onclick="showLanding()">رجوع</button>
        </div>
    </div>
    <!-- شاشة التسجيل -->
    <div id="registerScreen" class="screen">
        <div class="card">
            <h2 style="text-align:center;color:#1e4a6e">تسجيل جديد</h2>
            <input type="text" id="registerName" placeholder="الاسم الكامل">
            <input type="password" id="registerPassword" placeholder="كلمة السر">
            <button class="btn" onclick="doRegister()">إرسال الطلب</button>
            <button class="btn btn-outline" style="background:#ccc;color:#333" onclick="showLanding()">رجوع</button>
        </div>
    </div>
    <!-- شاشة الاختبار (الطالب) -->
    <div id="studentScreen" class="screen">
        <div class="card">
            <div class="row">
                <span class="pill" id="questionNum">السؤال 1</span>
                <span class="score-area" id="scoreDisplay">⭐ 0 نقطة</span>
            </div>
            <div id="dailyBadge" style="background:#fef3c7;padding:10px;border-radius:12px;margin-bottom:15px;text-align:center;display:none">
                🌟 تحدي اليوم - نقاط مضاعفة 🌟
            </div>
            <div id="questionImage" style="text-align:center;margin-bottom:15px;display:none">
                <img id="caseImage" src="" style="max-width:100%;max-height:200px;border-radius:12px">
            </div>
            <div id="questionText" class="q-text"></div>
            <div id="optionsContainer"></div>
            <div id="explanation" class="exp-box"></div>
            <button id="nextBtn" class="btn" style="display:none" onclick="nextQuestion()">التالي ➡️</button>
        </div>
        <button class="btn btn-danger" onclick="logout()">🚪 خروج</button>
    </div>
    <!-- شاشة النتيجة -->
    <div id="resultScreen" class="screen">
        <div class="card" style="text-align:center">
            <h2>📊 نتيجة الاختبار</h2>
            <div class="result-score" id="finalScore">0</div>
            <p id="percentageText" style="margin:10px 0"></p>
            <div id="wrongAnswersList"></div>
            <button class="btn" onclick="startNewQuiz()">🔄 اختبار جديد</button>
            <button class="btn btn-danger" style="margin-top:10px" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    <!-- شاشة الإدارة -->
    <div id="adminScreen" class="screen">
        <div class="card">
            <h3 style="color:#6c5ce7;text-align:center">✨ لوحة التحكم ✨</h3>
            
            <h4 style="margin:15px 0 5px">👥 الطلاب</h4>
            <button class="btn btn-admin" onclick="loadUsers()">📋 عرض الطلاب</button>
            <div id="usersList"></div>
            
            <h4 style="margin:15px 0 5px">📚 الأسئلة</h4>
            <button class="btn btn-admin" onclick="addQuestionForm()">➕ إضافة سؤال</button>
            <button class="btn btn-admin" style="margin-top:5px" onclick="loadQuestions()">📋 عرض الأسئلة</button>
            <div id="questionsList"></div>
            
            <button class="btn btn-danger" style="margin-top:15px" onclick="logout()">🚪 خروج</button>
        </div>
    </div>
    <!-- نافذة إضافة/تعديل سؤال -->
    <div id="questionModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;padding:20px;overflow:auto">
        <div class="card" style="max-width:500px;margin:50px auto">
            <h3 id="modalTitle">إضافة سؤال</h3>
            <input type="text" id="qText" placeholder="نص السؤال">
            <input type="text" id="opt1" placeholder="الخيار 1">
            <input type="text" id="opt2" placeholder="الخيار 2">
            <input type="text" id="opt3" placeholder="الخيار 3">
            <input type="text" id="opt4" placeholder="الخيار 4">
            <input type="text" id="correctOpt" placeholder="الخيار الصحيح (اكتب النص نفسه)">
            <input type="text" id="questionImageUrl" placeholder="رابط صورة (اختياري)">
            <textarea id="explanationText" rows="3" placeholder="الشرح العلمي"></textarea>
            <button class="btn" onclick="saveQuestion()">💾 حفظ</button>
            <button class="btn btn-outline" style="background:#ccc;color:#333;margin-top:5px" onclick="closeModal()">إلغاء</button>
        </div>
    </div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script>
// --- كود PWA لتمكين التثبيت ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:text/javascript,self.addEventListener("fetch",()=>{})');
}

// ========== إعداد Firebase ==========
const firebaseConfig = {
    apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
    authDomain: "quizdental-c4d5a.firebaseapp.com",
    projectId: "quizdental-c4d5a",
    databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com/",
    storageBucket: "quizdental-c4d5a.appspot.com",
    messagingSenderId: "750036143183",
    appId: "1:750036143183:web:721a31ef795f973887ee3a"
};
let db = null;
let currentUser = null;
let currentQuestions = [];
let currentIndex = 0;
let currentScore = 0;
let currentWrong = [];
let editingQuestionId = null;

try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    console.log("✅ Firebase connected");
    document.getElementById('connectionStatus').innerHTML = '🟢 متصل بقاعدة البيانات';
} catch(e) {
    console.error("Firebase error:", e);
    document.getElementById('connectionStatus').innerHTML = '🔴 خطأ في الاتصال';
}

// --- استمرار الجلسة عند إعادة التحميل ---
window.onload = () => {
    const savedUser = localStorage.getItem('userSession');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        if (currentUser.isAdmin) {
            showScreen('adminScreen');
            loadQuestions();
            loadUsers();
        } else {
            showScreen('studentScreen');
            startNewQuiz();
        }
    } else {
        showLanding();
    }
};

// ========== دوال الشاشات ==========
function showLanding() {
    showScreen('landingScreen');
}
function showLogin() {
    showScreen('loginScreen');
}
function showRegister() {
    showScreen('registerScreen');
}
function showAdminLogin() {
    showScreen('loginScreen');
    document.getElementById('loginUsername').value = 'admin';
    document.getElementById('loginPassword').focus();
}
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}
// ========== تسجيل الدخول والتسجيل ==========
async function doLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    
    if (!username || !password) {
        alert('الرجاء إدخال اسم المستخدم وكلمة السر');
        return;
    }
    
    // دخول الإدارة
    if (username === 'admin' && btoa(password) === 'c2FsZW0xOTU5') {
        currentUser = { isAdmin: true, name: 'admin' };
        localStorage.setItem('userSession', JSON.stringify(currentUser)); // حفظ الجلسة
        showScreen('adminScreen');
        loadQuestions();
        loadUsers();
        return;
    }
    
    const userKey = btoa(unescape(encodeURIComponent(username))).replace(/[^A-Za-z0-9]/g, '');
    
    try {
        const snapshot = await db.ref('users/' + userKey).once('value');
        const user = snapshot.val();
        
        if (user && user.password === password && user.status === 'active') {
            currentUser = { isAdmin: false, name: username, key: userKey, points: user.totalPoints || 0 };
            localStorage.setItem('userSession', JSON.stringify(currentUser)); // حفظ الجلسة
            showScreen('studentScreen');
            startNewQuiz();
        } else if (user && user.status === 'pending') {
            alert('حسابك قيد المراجعة من قبل المشرف');
        } else if (user && user.status === 'suspended') {
            alert('تم إيقاف حسابك');
        } else {
            alert('اسم المستخدم أو كلمة السر غير صحيحة');
        }
    } catch(e) {
        alert('خطأ: ' + e.message);
    }
}
async function doRegister() {
    const name = document.getElementById('registerName').value.trim();
    const password = document.getElementById('registerPassword').value.trim();
    
    if (!name || !password) {
        alert('الرجاء ملء جميع الحقول');
        return;
    }
    
    const userKey = btoa(unescape(encodeURIComponent(name))).replace(/[^A-Za-z0-9]/g, '');
    
    try {
        await db.ref('users/' + userKey).set({
            name: name,
            password: password,
            status: 'pending',
            totalPoints: 0,
            streak: 0,
            lastLoginDate: "",
            registeredAt: Date.now()
        });
        alert('تم إرسال طلب التسجيل بنجاح، سيتم تفعيل حسابك قريباً');
        showLanding();
    } catch(e) {
        alert('خطأ: ' + e.message);
    }
}
function logout() {
    localStorage.removeItem('userSession'); // مسح الجلسة
    currentUser = null;
    currentQuestions = [];
    currentIndex = 0;
    currentScore = 0;
    currentWrong = [];
    location.reload(); // إعادة التحميل للعودة للبداية
}
// ========== نظام الاختبار ==========
async function startNewQuiz() {
    try {
        const snapshot = await db.ref('questions').once('value');
        const questions = snapshot.val();
        
        if (!questions) {
            alert('لا توجد أسئلة في قاعدة البيانات، يرجى إضافة أسئلة أولاً');
            return;
        }
        
        currentQuestions = Object.entries(questions).map(([id, q]) => ({ id, ...q }));
        currentQuestions = currentQuestions.sort(() => Math.random() - 0.5);
        currentIndex = 0;
        currentScore = 0;
        currentWrong = [];
        
        renderQuestion();
    } catch(e) {
        alert('خطأ في تحميل الأسئلة: ' + e.message);
    }
}
function renderQuestion() {
    if (currentIndex >= currentQuestions.length) {
        showResult();
        return;
    }
    
    const q = currentQuestions[currentIndex];
    const qNum = document.getElementById('questionNum');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const qText = document.getElementById('questionText');
    const optsDiv = document.getElementById('optionsContainer');
    const expDiv = document.getElementById('explanation');
    const nextBtn = document.getElementById('nextBtn');
    const imgContainer = document.getElementById('questionImage');
    const caseImg = document.getElementById('caseImage');
    
    qNum.innerHTML = `السؤال ${currentIndex + 1}/${currentQuestions.length}`;
    scoreDisplay.innerHTML = `⭐ ${currentScore} نقطة`;
    qText.innerHTML = q.q;
    expDiv.style.display = 'none';
    nextBtn.style.display = 'none';
    
    // عرض الصورة إذا وجدت
    if (q.img && q.img.trim()) {
        caseImg.src = q.img;
        imgContainer.style.display = 'block';
    } else {
        imgContainer.style.display = 'none';
    }
    
    // عرض الخيارات بشكل عشوائي
    const options = [...q.o];
    options.sort(() => Math.random() - 0.5);
    
    optsDiv.innerHTML = '';
    options.forEach(opt => {
        const optionDiv = document.createElement('div');
        optionDiv.className = 'option';
        optionDiv.innerHTML = opt;
        optionDiv.onclick = () => checkAnswer(opt, q.c, q.e, optionDiv);
        optsDiv.appendChild(optionDiv);
    });
}
function checkAnswer(selected, correct, explanation, element) {
    const optsDiv = document.getElementById('optionsContainer');
    const expDiv = document.getElementById('explanation');
    
    // تعطيل جميع الخيارات
    optsDiv.querySelectorAll('.option').forEach(opt => {
        opt.style.pointerEvents = 'none';
    });
    
    if (selected === correct) {
        element.classList.add('correct');
        currentScore += 10;
        document.getElementById('scoreDisplay').innerHTML = `⭐ ${currentScore} نقطة`;
        
        // تحديث النقاط في قاعدة البيانات
        if (currentUser && !currentUser.isAdmin) {
            const userKey = currentUser.key;
            db.ref('users/' + userKey + '/totalPoints').transaction(p => (p || 0) + 10);
        }
    } else {
        element.classList.add('wrong');
        // أظهر الخيار الصحيح
        optsDiv.querySelectorAll('.option').forEach(opt => {
            if (opt.innerHTML === correct) {
                opt.classList.add('correct');
            }
        });
        currentWrong.push({
            question: currentQuestions[currentIndex].q,
            correct: correct,
            explanation: explanation
        });
    }
    
    // عرض الشرح
    expDiv.innerHTML = `<strong>📖 الشرح:</strong><br>${explanation}`;
    expDiv.style.display = 'block';
    
    // إظهار زر التالي
    const nextBtn = document.getElementById('nextBtn');
    nextBtn.style.display = 'block';
}
function nextQuestion() {
    currentIndex++;
    renderQuestion();
}
function showResult() {
    const total = currentQuestions.length * 10;
    const percentage = Math.round((currentScore / total) * 100);
    
    document.getElementById('finalScore').innerHTML = `${currentScore} / ${total}`;
    document.getElementById('percentageText').innerHTML = `الدقة: ${percentage}%`;
    
    const wrongDiv = document.getElementById('wrongAnswersList');
    if (currentWrong.length === 0) {
        wrongDiv.innerHTML = '<p style="color:#00b894;text-align:center">🎉 ممتاز! لا توجد إجابات خاطئة 🎉</p>';
    } else {
        wrongDiv.innerHTML = '<h4 style="margin:15px 0 10px">📝 أسئلة تحتاج مراجعة:</h4>';
        currentWrong.forEach((item, i) => {
            wrongDiv.innerHTML += `
                <div class="wrong-item">
                    <strong>${i+1}.</strong> ${item.question}<br>
                    ✅ الإجابة الصحيحة: ${item.correct}<br>
                    📖 ${item.explanation}
                </div>
            `;
        });
    }
    
    showScreen('resultScreen');
}
// ========== دوال الإدارة ==========
async function loadQuestions() {
    const container = document.getElementById('questionsList');
    container.innerHTML = '<p style="text-align:center">⏳ جاري التحميل...</p>';
    
    try {
        const snapshot = await db.ref('questions').once('value');
        const questions = snapshot.val();
        
        if (!questions) {
            container.innerHTML = '<p style="text-align:center;color:#888">لا توجد أسئلة</p>';
            return;
        }
        
        container.innerHTML = '';
        Object.entries(questions).forEach(([id, q]) => {
            const div = document.createElement('div');
            div.className = 'q-item';
            div.innerHTML = `
                <div><strong>${q.q.substring(0, 100)}${q.q.length > 100 ? '...' : ''}</strong></div>
                <div style="color:#00b894;font-size:13px;margin:5px 0">✅ ${q.c}</div>
                <div class="row" style="margin-top:10px">
                    <button class="btn" style="background:#ffb703;width:auto;padding:5px 15px" onclick="editQuestion('${id}', ${JSON.stringify(q).replace(/"/g, '&quot;')})">✏️ تعديل</button>
                    <button class="btn" style="background:#e17055;width:auto;padding:5px 15px" onclick="deleteQuestion('${id}')">🗑️ حذف</button>
                </div>
            `;
            container.appendChild(div);
        });
    } catch(e) {
        container.innerHTML = '<p style="color:red">خطأ في التحميل</p>';
    }
}
function addQuestionForm() {
    editingQuestionId = null;
    document.getElementById('modalTitle').innerHTML = '➕ إضافة سؤال جديد';
    document.getElementById('qText').value = '';
    document.getElementById('opt1').value = '';
    document.getElementById('opt2').value = '';
    document.getElementById('opt3').value = '';
    document.getElementById('opt4').value = '';
    document.getElementById('correctOpt').value = '';
    document.getElementById('questionImageUrl').value = '';
    document.getElementById('explanationText').value = '';
    document.getElementById('questionModal').style.display = 'flex';
}
function editQuestion(id, q) {
    editingQuestionId = id;
    document.getElementById('modalTitle').innerHTML = '✏️ تعديل السؤال';
    document.getElementById('qText').value = q.q;
    document.getElementById('opt1').value = q.o[0] || '';
    document.getElementById('opt2').value = q.o[1] || '';
    document.getElementById('opt3').value = q.o[2] || '';
    document.getElementById('opt4').value = q.o[3] || '';
    document.getElementById('correctOpt').value = q.c || '';
    document.getElementById('questionImageUrl').value = q.img || '';
    document.getElementById('explanationText').value = q.e || '';
    document.getElementById('questionModal').style.display = 'flex';
}
async function saveQuestion() {
    const qText = document.getElementById('qText').value.trim();
    const opt1 = document.getElementById('opt1').value.trim();
    const opt2 = document.getElementById('opt2').value.trim();
    const opt3 = document.getElementById('opt3').value.trim();
    const opt4 = document.getElementById('opt4').value.trim();
    const correct = document.getElementById('correctOpt').value.trim();
    const imgUrl = document.getElementById('questionImageUrl').value.trim();
    const explanation = document.getElementById('explanationText').value.trim();
    
    if (!qText || !opt1 || !opt2 || !opt3 || !opt4 || !correct || !explanation) {
        alert('الرجاء ملء جميع الحقول');
        return;
    }
    
    if (![opt1, opt2, opt3, opt4].includes(correct)) {
        alert('الخيار الصحيح يجب أن يطابق أحد الخيارات المدخلة');
        return;
    }
    
    const questionData = {
        q: qText,
        o: [opt1, opt2, opt3, opt4],
        c: correct,
        e: explanation,
        img: imgUrl
    };
    
    try {
        if (editingQuestionId) {
            await db.ref('questions/' + editingQuestionId).set(questionData);
            alert('تم تعديل السؤال بنجاح');
        } else {
            await db.ref('questions').push(questionData);
            alert('تم إضافة السؤال بنجاح');
        }
        closeModal();
        loadQuestions();
    } catch(e) {
        alert('خطأ: ' + e.message);
    }
}
async function deleteQuestion(id) {
    if (confirm('هل أنت متأكد من حذف هذا السؤال؟')) {
        try {
            await db.ref('questions/' + id).remove();
            alert('تم حذف السؤال');
            loadQuestions();
        } catch(e) {
            alert('خطأ: ' + e.message);
        }
    }
}
async function loadUsers() {
    const container = document.getElementById('usersList');
    container.innerHTML = '<p style="text-align:center">⏳ جاري التحميل...</p>';
    
    try {
        const snapshot = await db.ref('users').once('value');
        const users = snapshot.val();
        
        if (!users) {
            container.innerHTML = '<p style="text-align:center;color:#888">لا يوجد طلاب مسجلين</p>';
            return;
        }
        
        container.innerHTML = '';
        Object.entries(users).forEach(([key, user]) => {
            let statusClass = '';
            let statusText = '';
            if (user.status === 'active') {
                statusClass = 'tag-active';
                statusText = 'نشط';
            } else if (user.status === 'pending') {
                statusClass = 'tag-pending';
                statusText = 'قيد المراجعة';
            } else {
                statusClass = 'tag-suspended';
                statusText = 'موقوف';
            }
            
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div><strong>${user.name}</strong> <span class="tag ${statusClass}">${statusText}</span></div>
                <div style="font-size:13px;color:#666">🏆 النقاط: ${user.totalPoints || 0}</div>
                <div style="font-size:12px;color:#888">🔑 ${user.password}</div>
                <div class="row" style="margin-top:10px">
                    ${user.status !== 'active' ? `<button class="btn" style="background:#00b894;width:auto;padding:5px 15px" onclick="updateUserStatus('${key}', 'active')">✅ تفعيل</button>` : ''}
                    ${user.status !== 'suspended' ? `<button class="btn" style="background:#fdcb6e;width:auto;padding:5px 15px" onclick="updateUserStatus('${key}', 'suspended')">⛔ إيقاف</button>` : ''}
                    <button class="btn" style="background:#e17055;width:auto;padding:5px 15px" onclick="deleteUser('${key}', '${user.name}')">🗑️ حذف</button>
                </div>
            `;
            container.appendChild(div);
        });
    } catch(e) {
        container.innerHTML = '<p style="color:red">خطأ في التحميل</p>';
    }
}
async function updateUserStatus(key, status) {
    try {
        await db.ref('users/' + key).update({ status: status });
        alert(`تم تغيير الحالة إلى ${status === 'active' ? 'نشط' : 'موقوف'}`);
        loadUsers();
    } catch(e) {
        alert('خطأ: ' + e.message);
    }
}
async function deleteUser(key, name) {
    if (confirm(`هل أنت متأكد من حذف الطالب "${name}" نهائياً؟`)) {
        try {
            await db.ref('users/' + key).remove();
            alert('تم حذف الطالب');
            loadUsers();
        } catch(e) {
            alert('خطأ: ' + e.message);
        }
    }
}
function closeModal() {
    document.getElementById('questionModal').style.display = 'none';
    editingQuestionId = null;
}
</script>
