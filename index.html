<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدرب التشخيص السني - الدكتور زكريا عطوني</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/192/tooth.png">
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tajawal', sans-serif; }
        body { background: linear-gradient(135deg, #e0f2fe, #f0f9ff); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 10px; }
        .app { width: 100%; max-width: 580px; display: flex; flex-direction: column; gap: 10px; }
        .header { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px; padding: 15px 20px; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { font-size: 1.3rem; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .header p { font-size: 0.85rem; opacity: 0.9; }
        .status-dot { width: 10px; height: 10px; background: #e17055; border-radius: 50%; display: inline-block; }
        .status-dot.ok { background: #00b894; box-shadow: 0 0 8px #00b894; }
        
        .online-count { font-size: 0.85rem; background: rgba(255, 255, 255, 0.2); padding: 2px 10px; border-radius: 12px; margin-right: 8px; font-weight: bold; display: none; }
        
        .screen { display: none; animation: fade 0.3s; }
        .screen.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        h2 { color: #1e4a6e; text-align: center; margin-bottom: 15px; font-size: 1.4rem; }
        
        .btn { background: linear-gradient(105deg, #1f7b6e, #2c9b7a); color: white; border: none; padding: 12px; border-radius: 40px; font-weight: 700; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 5px; }
        .btn:hover { transform: translateY(-2px); }
        .btn-resume { background: linear-gradient(105deg, #f39c12, #d35400); margin-bottom: 12px; display: none; }
        
        .option { background: #fafefd; border: 1.5px solid #e2f0ed; padding: 12px 20px; border-radius: 50px; margin: 8px 0; cursor: pointer; font-weight: 600; text-align: right; transition: 0.2s; }
        .option.correct { background: linear-gradient(135deg, #00b894, #009688); color: white; border: none; }
        .option.wrong { background: linear-gradient(135deg, #ff7675, #d63031); color: white; border: none; }
        .exp { background: #fff7e5; border-right: 4px solid #f4b942; padding: 10px; border-radius: 15px; margin-top: 10px; font-size: 0.9rem; color: #7a5a2a; display: none; }
        .pill { background: #e6f4f0; color: #1f6e5c; padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 700; }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .footer { background: linear-gradient(135deg, #1e4a6e, #2c9b7a); border-radius: 24px; padding: 12px; text-align: center; color: white; font-size: 0.8rem; }
        .error { background: #ffebee; color: #c62828; padding: 10px; border-radius: 12px; margin: 10px 0; font-size: 0.9rem; display: none; }
        .error.show { display: block; }
        #quizArea { flex: 1; overflow-y: auto; max-height: 400px; padding-right: 5px; }
        
        .main-app-btn { background: linear-gradient(105deg, #3b82f6, #1d4ed8); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 24px; font-weight: 700; width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(29, 78, 216, 0.2); transition: 0.2s; font-size: 1rem; margin-top: 5px; }
        .main-app-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(29, 78, 216, 0.4); }
        .whatsapp-btn { background: linear-gradient(105deg, #25D366, #128C7E); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 24px; font-weight: 700; width: 100%; text-align: center; box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2); transition: 0.2s; font-size: 1rem; }
        .whatsapp-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(37, 211, 102, 0.3); }
        
        .admin-notice-box { background: #e0f2fe; border: 2px solid #0284c7; border-radius: 18px; padding: 0px; text-align: center; color: #0369a1; font-weight: 800; font-size: 0.95rem; line-height: 1.5; display: none; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.05); overflow: hidden; width: 100%; }
        .admin-notice-box img { width: 100%; max-height: 250px; object-fit: contain; display: none; margin: 0 auto; background: #fff; }
        .admin-notice-text { padding: 15px; display: block; }
        .report-box { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 16px; text-align: center; }
        .wrong-review-item { background: #fff5f5; border-right: 4px solid #f56565; padding: 12px; border-radius: 14px; margin-bottom: 10px; text-align: right; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <h1>
            مدرب التشخيص السني 
            <span id="dot" class="status-dot"></span>
            <span id="onlineCountBox" class="online-count"></span>
        </h1>
        <p>بإشراف الدكتور زكريا محمد عطوني</p>
    </div>
    <div id="err" class="error"></div>
    
    <!-- شاشة اختبار الطالب المباشرة -->
    <div id="student" class="screen active">
        <div class="card">
            <button id="resumeBtn" class="btn btn-resume" onclick="resumeSession()">استئناف الجلسة السابقة المتبقية</button>
            
            <div id="quizContent">
                <div class="row">
                    <span class="pill" id="qNum">--</span>
                    <span class="pill" id="score">النقاط: 0</span>
                </div>
                <div id="quizArea">
                    <div id="qText" style="font-size:1.2rem; font-weight:800; color:#1f3e48; margin-bottom:15px;"></div>
                    <div id="opts"></div>
                    <div id="exp" class="exp"></div>
                </div>
            </div>
            
            <div id="reportArea" style="display:none; max-height:400px; overflow-y:auto; margin-bottom:15px;">
                <h2>تقرير الأداء والمراجعة</h2>
                <div class="report-box">
                    <div style="font-size:1.1rem; font-weight:bold; color:#166534;" id="repScore"></div>
                    <div style="font-size:0.9rem; color:#4b5563;" id="repPercent"></div>
                </div>
                <h4 style="color:#c53030; margin-bottom:8px; text-align:right;" id="repWrongTitle">أسئلة تحتاج مراجعة وتدقيق علمي:</h4>
                <div id="wrongList"></div>
            </div>
            <button id="quizActionBtn" class="btn" style="background:#e2edf0; color:#4a5568;" onclick="resetCurrentQuiz()">إعادة تصفير البدء من جديد</button>
        </div>
    </div>
    
    <div id="appNoticeBox" class="admin-notice-box"></div>
    <a href="https://zakariaattouni.github.io/dental-diagnosis/" target="_blank" class="main-app-btn">الانتقال إلى تطبيق تشخيص أمراض الفم والأسنان</a>
    <a href="https://wa.me/963939436998" target="_blank" class="whatsapp-btn">تواصل معنا عبر واتساب</a>
    <div class="footer">إعداد الدكتور زكريا محمد عطوني | حقوق النشر 2026</div>
</div>

<script>
const cfg = { apiKey:"AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA", authDomain:"quizdental-c4d5a.firebaseapp.com", projectId:"quizdental-c4d5a", databaseURL:"https://quizdental-c4d5a-default-rtdb.firebaseio.com/", storageBucket:"quizdental-c4d5a.appspot.com", messagingSenderId:"750036143183", appId:"1:750036143183:web:721a31ef795f973887ee3a" };
firebase.initializeApp(cfg);
const db = firebase.database();
let Qs = [], quiz = [], score = 0, qi = 0, onlineRef = null;
let wrongAnswersHistory = []; 
const K = { PROGRESS_QUIZ:'dq_pq', PROGRESS_INDEX:'dq_pi', PROGRESS_SCORE:'dq_ps', PROGRESS_WRONG:'dq_pw' };

db.ref('.info/connected').on('value', s => {
    const isConnected = s.val();
    document.getElementById('dot').className = 'status-dot' + (isConnected ? ' ok' : '');
    if (isConnected) {
        const myPresenceRef = db.ref('online_status').push();
        myPresenceRef.set(true);
        myPresenceRef.onDisconnect().remove();
    }
});

window.onload = async () => {
    try {
        startListeningOnlineCount();
        listenToNotice();
        await loadQs();
        checkSavedProgress();
    } catch(e) {
        showError('خطأ أثناء تحميل البيانات: ' + e.message);
    }
};

function startListeningOnlineCount() {
    const box = document.getElementById('onlineCountBox');
    if (!box) return;
    box.style.display = 'inline-block';
    if (onlineRef) db.ref('online_status').off('value', onlineRef);
    onlineRef = db.ref('online_status').on('value', snap => {
        const count = snap.numChildren() || 0;
        box.innerText = 'المتصلون الآن: ' + count;
    });
}

async function loadQs() {
    const snap = await db.ref('questions').once('value');
    const d = snap.val(); 
    Qs = d ? Object.entries(d).map(([id,q])=>({...q, id})) : [];
}

function checkSavedProgress() {
    document.getElementById('quizContent').style.display = 'block';
    document.getElementById('reportArea').style.display = 'none';
    document.getElementById('quizActionBtn').innerText = 'إعادة تصفير البدء من جديد';
    document.getElementById('quizActionBtn').onclick = resetCurrentQuiz;
    
    const savedQuiz = localStorage.getItem(K.PROGRESS_QUIZ);
    const savedIndex = localStorage.getItem(K.PROGRESS_INDEX);
    const savedScore = localStorage.getItem(K.PROGRESS_SCORE);
    
    if (savedQuiz && savedIndex && savedScore) {
        const resumeBtn = document.getElementById('resumeBtn');
        resumeBtn.style.display = 'block';
        resumeBtn.innerText = `استئناف الجلسة السابقة (سؤال رقم ${parseInt(savedIndex) + 1})`;
    }
    startQuiz(false); 
}

function startQuiz(forceNew = true) {
    if (!Qs.length) { 
        document.getElementById('qText').innerText = 'جاري مزامنة أسئلة العيادة السنية من السيرفر أو البنك فارغ...'; 
        return; 
    }
    if (forceNew) {
        clearProgressStorage(); 
        document.getElementById('resumeBtn').style.display = 'none';
        quiz = [...Qs].sort(()=>Math.random()-0.5); 
        score = 0; qi = 0; wrongAnswersHistory = []; 
        renderQ();
    } else {
        // التحضير الأولي لكن دون تصفير مخصص في حال قرر الاستئناف
        quiz = [...Qs].sort(()=>Math.random()-0.5); 
        score = 0; qi = 0; wrongAnswersHistory = []; 
        renderQ();
    }
}

function resumeSession() {
    try {
        const savedQuiz = JSON.parse(localStorage.getItem(K.PROGRESS_QUIZ));
        const savedIndex = parseInt(localStorage.getItem(K.PROGRESS_INDEX));
        const savedScore = parseInt(localStorage.getItem(K.PROGRESS_SCORE));
        const savedWrong = JSON.parse(localStorage.getItem(K.PROGRESS_WRONG)) || [];
        if (savedQuiz && savedQuiz.length > 0) {
            quiz = savedQuiz; qi = savedIndex; score = savedScore; wrongAnswersHistory = savedWrong;
            document.getElementById('resumeBtn').style.display = 'none'; 
            renderQ();
        }
    } catch (e) { 
        startQuiz(true); 
    }
}

function resetCurrentQuiz() {
    if(confirm('هل تود التخلي عن التقدم الحالي والبدء بأسئلة عشوائية جديدة؟')) {
        startQuiz(true);
    }
}

function saveCurrentProgressToStorage() {
    localStorage.setItem(K.PROGRESS_QUIZ, JSON.stringify(quiz));
    localStorage.setItem(K.PROGRESS_INDEX, qi);
    localStorage.setItem(K.PROGRESS_SCORE, score);
    localStorage.setItem(K.PROGRESS_WRONG, JSON.stringify(wrongAnswersHistory));
}

function clearProgressStorage() {
    localStorage.removeItem(K.PROGRESS_QUIZ); 
    localStorage.removeItem(K.PROGRESS_INDEX);
    localStorage.removeItem(K.PROGRESS_SCORE); 
    localStorage.removeItem(K.PROGRESS_WRONG);
}

function renderQ() {
    if (qi >= quiz.length) { 
        clearProgressStorage(); 
        showFinalReport(); 
        return; 
    }
    
    const q = quiz[qi];
    document.getElementById('qNum').innerText = `سؤال رقم: ${qi+1}/${quiz.length}`;
    document.getElementById('score').innerText = `النقاط: ${score}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('exp').style.display = 'none';
    const opts = document.getElementById('opts'); 
    opts.innerHTML = '';
    
    const mixedOptions = [...q.o].sort(()=>Math.random()-0.5);
    mixedOptions.forEach(opt => {
        const div = document.createElement('div'); 
        div.className = 'option'; 
        div.innerText = opt;
        div.onclick = () => {
            if (opts.querySelector('.correct,.wrong')) return;
            if (opt === q.c) { 
                score += 10; 
                div.classList.add('correct'); 
            } else { 
                div.classList.add('wrong'); 
                [...opts.children].forEach(c=>{ if(c.innerText===q.c) c.classList.add('correct'); });
                wrongAnswersHistory.push({ q: q.q, c: q.c, e: q.e });
            }
            document.getElementById('score').innerText = `النقاط: ${score}`;
            const exp = document.getElementById('exp');
            exp.innerHTML = `<b>التفسير العلمي للعيادة:</b><br>${q.e}`; 
            exp.style.display = 'block';
            setTimeout(()=>{ qi++; saveCurrentProgressToStorage(); renderQ(); }, 1800);
        };        
        opts.appendChild(div);
    });
}

function showFinalReport() {
    document.getElementById('quizContent').style.display = 'none';
    document.getElementById('reportArea').style.display = 'block';
    const maxScore = quiz.length * 10; 
    const percent = Math.round((score / maxScore) * 100) || 0;
    
    document.getElementById('repScore').innerText = `نتيجة طبيبنا النهائية هي: ${score} من أصل ${maxScore} نقطة`;
    document.getElementById('repPercent').innerText = `نسبة التشخيص الصحيحة الإجمالية: ${percent}%`;
    
    const wrongList = document.getElementById('wrongList'); 
    wrongList.innerHTML = '';
    if (wrongAnswersHistory.length === 0) {
        document.getElementById('repWrongTitle').innerText = "رائع ومذهل! تشخيصاتك الطبية سليمة بنسبة 100% في هذه الجولة.";
    } else {
        document.getElementById('repWrongTitle').innerText = "أسئلة وحالات تعثرت بها تحتاج مراجعة علمية وتدقيق دكتور:";
        wrongAnswersHistory.forEach((item, index) => {
            const div = document.createElement('div'); 
            div.className = 'wrong-review-item';
            div.innerHTML = `<div><strong>حالة رقم (${index + 1}):</strong> ${item.q}</div>
                <div style="color:#155724; font-weight:bold; margin-top:4px;">الجواب العلمي الصحيح: ${item.c}</div>
                <div style="color:#7a5a2a; margin-top:4px; font-size:0.85rem; background:#fffdf5; padding:5px; border-radius:8px;">💡 التفسير: ${item.e}</div>`;
            wrongList.appendChild(div);
        });
    }
    const actionBtn = document.getElementById('quizActionBtn');
    actionBtn.innerText = 'بدء جولة اختبار وتدريب جديدة';
    actionBtn.style.background = 'linear-gradient(105deg, #1f7b6e, #2c9b7a)'; 
    actionBtn.style.color = 'white';
    actionBtn.onclick = () => { checkSavedProgress(); };
}

let noticeTimeout = null; let currentNoticeIndex = 0; let noticeLines = [];

function checkIsImage(content) { return /\.(jpeg|jpg|gif|png|webp)$/i.test(content.toLowerCase()) || content.startsWith('data:image/'); }

function displayNoticeContent(targetBox, noticeObj) {
    if (noticeTimeout) clearTimeout(noticeTimeout);
    const displayDuration = noticeObj.time ? noticeObj.time * 1000 : 4000;
    
    if (checkIsImage(noticeObj.content)) {
        targetBox.innerHTML = `<div id="noticeTxt" class="admin-notice-text">جاري تحميل الصورة الإعلانية...</div>
            <img id="noticeImg" src="${noticeObj.content}" alt="إعلان" style="display:none;">`;
        const img = document.getElementById('noticeImg'); 
        const txt = document.getElementById('noticeTxt');
        
        let fallbackTimeout = setTimeout(() => { nextNotice(); }, displayDuration + 2000);
        
        img.onload = () => { 
            clearTimeout(fallbackTimeout); txt.style.display = 'none'; img.style.display = 'block'; 
            noticeTimeout = setTimeout(nextNotice, displayDuration); 
        };
        img.onerror = () => { clearTimeout(fallbackTimeout); nextNotice(); };
    } else {
        targetBox.innerHTML = `<span class="admin-notice-text">${noticeObj.content}</span>`;
        noticeTimeout = setTimeout(nextNotice, displayDuration);
    }
}

function nextNotice() {
    if (noticeLines.length <= 1) return;
    const box = document.getElementById('appNoticeBox');
    currentNoticeIndex = (currentNoticeIndex + 1) % noticeLines.length; 
    displayNoticeContent(box, noticeLines[currentNoticeIndex]);
}

function listenToNotice() {
    db.ref('app_notice').on('value', snap => {
        const rawText = snap.val() || ""; 
        const box = document.getElementById('appNoticeBox');
        const lines = rawText.split('\n').map(line => line.trim()).filter(line => line !== "");
        
        noticeLines = lines.map(line => {
            if (line.includes('*')) {
                const parts = line.split('*');
                return { content: parts[0].trim(), time: parseInt(parts[1].trim()) || null };
            }
            return { content: line, time: null };
        });
        
        if(noticeTimeout) clearTimeout(noticeTimeout); 
        currentNoticeIndex = 0;
        if (noticeLines.length > 0) { 
            box.style.display = 'block'; 
            displayNoticeContent(box, noticeLines[0]); 
        } else { 
            box.style.display = 'none'; 
        }
    });
}

function showError(m) { 
    const e = document.getElementById('err'); 
    e.innerText = m; e.classList.add('show'); 
    setTimeout(()=>e.classList.remove('show'), 4000); 
}
</script>
</body>
</html>
