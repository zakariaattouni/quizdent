<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مدرب التشخيص السني | د. زكريا عطوني</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Tajawal', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* يمنع سحب الشاشة بالكامل */
        }

        .app-container {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        .screen {
            display: none;
            flex-direction: column;
            height: 100%;
            animation: fadeSlideUp 0.3s ease-out;
        }

        .active { display: flex; }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 15px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(66, 153, 225, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden; /* لاحتواء المكونات بالداخل */
            flex: 1;
        }

        /* تنسيق السؤال والخيارات لتناسب الشاشة */
        .quiz-content {
            flex: 1;
            overflow-y: auto; /* يسمح بالتمرير فقط إذا كانت الخيارات كثيرة */
            padding-right: 5px;
            margin-bottom: 10px;
        }

        h2 {
            color: #1e4a6e;
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: #1f3e48;
            line-height: 1.4;
        }

        .option-card {
            background: #fafefd;
            border: 1.5px solid #e2f0ed;
            padding: 12px 20px;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 8px;
            text-align: right;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .correct-card {
            background: linear-gradient(135deg, #00b894, #009688) !important;
            color: white !important;
            border: none !important;
        }

        .wrong-card {
            background: linear-gradient(135deg, #ff7675, #d63031) !important;
            color: white !important;
            border: none !important;
        }

        .exp-box {
            background: #fff7e5;
            border-right: 4px solid #f4b942;
            padding: 10px;
            border-radius: 15px;
            font-size: 0.9rem;
            margin-top: 5px;
            color: #7a5a2a;
        }

        .status-pill {
            background: #e6f4f0;
            color: #1f6e5c;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .flex-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 20px;
            border: 1px solid #dceaf2;
            outline: none;
        }

        .btn {
            background: linear-gradient(105deg, #1f7b6e, #2c9b7a);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
        }

        footer {
            padding: 8px;
            color: #528d7c;
            text-align: center;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        /* Scrollbar styling for a cleaner look */
        .quiz-content::-webkit-scrollbar { width: 4px; }
        .quiz-content::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- شاشة الدخول -->
    <div id="loginScreen" class="screen active">
        <div class="card" style="justify-content: center; flex: 0 1 auto; margin-top: auto; margin-bottom: auto;">
            <h2>🦷 مدرب التشخيص السني</h2>
            <p style="text-align:center; font-size:0.9rem; margin-bottom:15px;">بإشراف د. زكريا عطوني</p>
            <input type="text" id="username" placeholder="اسم المستخدم" autocomplete="off">
            <input type="password" id="password" placeholder="كلمة السر">
            <button class="btn" onclick="doLogin()">🎯 دخول</button>
            <p style="margin-top:15px; text-align:center;"><a href="#" style="color:#2c9b7a; font-size:0.85rem; text-decoration:none;" onclick="showScreen('registerScreen')">إنشاء حساب طالب جديد</a></p>
        </div>
    </div>

    <!-- شاشة الطالب -->
    <div id="studentScreen" class="screen">
        <div class="card">
            <div class="flex-row">
                <span class="status-pill" id="qCounter">--</span>
                <span class="status-pill" id="scoreValue">⭐ 0</span>
            </div>
            
            <div class="quiz-content" id="quizScrollArea">
                <div id="qText" class="question-text"></div>
                <div id="optionsGrid"></div>
                <div id="expBox" class="exp-box" style="display:none;"></div>
            </div>

            <button class="btn" style="background:#e2edf0; color:#4a5568; margin-top: auto;" onclick="logout()">🚪 خروج</button>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="adminScreen" class="screen">
        <div class="card">
            <h3 style="margin-bottom:10px; color:#5f4b8b;">🔧 لوحة الإدارة</h3>
            <div class="quiz-content" id="adminList">
                <button class="btn" style="background:#5f4b8b; margin-bottom:10px;" onclick="showAddSingleForm()">➕ إضافة سؤال جديد</button>
                <div id="adminQuestionsList"></div>
            </div>
            <button class="btn" onclick="logout()">🚪 تسجيل خروج</button>
        </div>
    </div>

    <!-- مودال الإضافة (مبسط) -->
    <div id="singleModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:100; padding:15px;">
        <div class="card" style="flex:0 1 auto; width:100%; max-width:400px; max-height:90vh; overflow-y:auto;">
            <h3>📌 تفاصيل السؤال</h3>
            <input type="text" id="newQ" placeholder="نص السؤال">
            <input type="text" id="newOpt1" placeholder="خيار 1">
            <input type="text" id="newOpt2" placeholder="خيار 2">
            <input type="text" id="newOpt3" placeholder="خيار 3">
            <input type="text" id="newOpt4" placeholder="خيار 4">
            <input type="text" id="newCorrect" placeholder="الإجابة الصحيحة">
            <textarea id="newExp" style="width:100%; border-radius:15px; padding:10px; border:1px solid #ddd;" placeholder="التفسير"></textarea>
            <div class="flex-row" style="margin-top:10px; gap:10px;">
                <button class="btn" id="saveQuestionBtn">حفظ</button>
                <button class="btn" style="background:#ccc;" onclick="closeModal()">إلغاء</button>
            </div>
        </div>
    </div>

    <footer>🦷 إعداد الدكتور زكريا محمد عطوني</footer>
</div>

<script>
// الإعدادات وقاعدة البيانات
const firebaseConfig = {
    apiKey: "AIzaSyDUgwNmS9l_gTJEUFfvRimTR8gDpX5QTdA",
    authDomain: "quizdental-c4d5a.firebaseapp.com",
    projectId: "quizdental-c4d5a",
    databaseURL: "https://quizdental-c4d5a-default-rtdb.firebaseio.com/",
    storageBucket: "quizdental-c4d5a.appspot.com",
    messagingSenderId: "750036143183",
    appId: "1:750036143183:web:721a31ef795f973887ee3a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questionsList = [], quizQuestions = [], quizScore = 0, quizIndex = 0;

window.onload = checkPersistentLogin;

async function checkPersistentLogin() {
    const u = localStorage.getItem('dentalQuizUser'), p = localStorage.getItem('dentalQuizPass');
    if (u && p) await handleLoginLogic(u, p, true);
}

async function doLogin() {
    const u = document.getElementById('username').value.trim(), p = document.getElementById('password').value.trim();
    await handleLoginLogic(u, p, false);
}

async function handleLoginLogic(u, p, isAuto) {
    if(!p) return;
    if(p === "salem1959") {
        localStorage.setItem('dentalQuizUser', u); localStorage.setItem('dentalQuizPass', p);
        await loadQuestions(); showAdminPanel(); return;
    }
    try {
        let snap = await db.ref('users/'+makeKey(u)).once('value');
        let data = snap.val();
        if(data && data.password === p && data.status === 'active') {
            localStorage.setItem('dentalQuizUser', u); localStorage.setItem('dentalQuizPass', p);
            await loadQuestions(); startStudentQuiz();
        } else if(!isAuto) alert("الحساب خاطئ أو غير مفعل");
    } catch(e) {}
}

async function loadQuestions() {
    let snap = await db.ref('questions').once('value');
    let data = snap.val();
    questionsList = data ? Object.entries(data).map(([id,q])=>({...q, firebaseId:id})) : [];
}

function startStudentQuiz() {
    if(!questionsList.length) return (alert("لا توجد أسئلة."), logout());
    quizQuestions = [...questionsList].sort(()=>Math.random()-0.5);
    quizScore = 0; quizIndex = 0;
    showScreen('studentScreen');
    renderQuiz();
}

function renderQuiz() {
    if(quizIndex >= quizQuestions.length) { 
        alert(`تم الانتهاء! النقاط: ${quizScore}`);
        startStudentQuiz(); return; 
    }
    let q = quizQuestions[quizIndex];
    document.getElementById('qCounter').innerText = `س ${quizIndex+1}/${quizQuestions.length}`;
    document.getElementById('scoreValue').innerHTML = `⭐ ${quizScore}`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('expBox').style.display = 'none';
    let grid = document.getElementById('optionsGrid');
    grid.innerHTML = "";

    let shuffledOptions = [...q.o].sort(() => Math.random() - 0.5);
    shuffledOptions.forEach(opt=>{
        let div = document.createElement('div');
        div.className = 'option-card';
        div.innerText = opt;
        div.onclick = ()=>{
            if(document.querySelector('.correct-card')) return;
            if(opt === q.c) { 
                quizScore += 10;
                div.classList.add('correct-card');
            } else {
                div.classList.add('wrong-card');
                Array.from(grid.children).forEach(ch => {
                    if(ch.innerText === q.c) ch.classList.add('correct-card');
                });
            }
            document.getElementById('scoreValue').innerHTML = `⭐ ${quizScore}`;
            document.getElementById('expBox').innerHTML = `<b>📘 التفسير:</b> ${q.e || "لا يوجد"}`;
            document.getElementById('expBox').style.display = 'block';
            
            // تمرير تلقائي للشرح إذا ظهر في الأسفل
            setTimeout(() => {
                document.getElementById('quizScrollArea').scrollTo({top: 500, behavior: 'smooth'});
            }, 100);

            setTimeout(()=>{ quizIndex++; renderQuiz(); }, 2000);
        };
        grid.appendChild(div);
    });
}

function showAdminPanel() { showScreen('adminScreen'); renderAdminList(); }
function renderAdminList() {
    let container = document.getElementById('adminQuestionsList');
    container.innerHTML = "";
    questionsList.forEach((q,i)=>{
        let d = document.createElement('div');
        d.style.padding = "10px"; d.style.borderBottom = "1px solid #eee";
        d.innerHTML = `<div>${i+1}. ${q.q}</div><button onclick="deleteQuestion('${q.firebaseId}')" style="color:red; border:none; background:none; cursor:pointer;">حذف</button>`;
        container.appendChild(d);
    });
}

function showScreen(id) { 
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
    document.getElementById(id).classList.add('active'); 
}
function makeKey(s) { return btoa(unescape(encodeURIComponent(s))).replace(/[/+=]/g,""); }
function logout() { localStorage.clear(); location.reload(); }
function closeModal() { document.getElementById('singleModal').style.display = 'none'; }
function showAddSingleForm() { document.getElementById('singleModal').style.display = 'flex'; }

async function deleteQuestion(id) { 
    if(confirm("حذف؟")) { await db.ref('questions/'+id).remove(); await loadQuestions(); renderAdminList(); } 
}
</script>
</body>
</html>
